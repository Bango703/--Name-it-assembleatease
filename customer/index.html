<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap:1rem; margin-bottom:2rem; }
    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap:1.5rem; }
    .item-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem;
      margin-bottom: 0.6rem; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none; display: block;
    }
    .item-card:hover { border-color: #c8c4bb; box-shadow: var(--shadow-sm); }
    .item-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:0.5rem; margin-bottom:0.35rem; }
    .item-card h4 { font-size:0.9rem; font-weight:500; color:var(--ink); line-height:1.3; }
    .item-card-desc { font-size:0.82rem; color:var(--ink-soft); line-height:1.55; margin-bottom:0.35rem; }
    .item-card-meta { font-size:0.75rem; color:var(--muted); }
    .avatar-sm { width:38px; height:38px; border-radius:50%; background:var(--accent-light); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:0.78rem; font-weight:500; flex-shrink:0; }
    .section-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
    .section-hdr h3 { font-size:1rem; font-weight:500; color:var(--ink); }
    @media(max-width:900px){ .stats-grid{grid-template-columns:repeat(2,1fr);} .content-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<button class="sidebar-toggle" id="sidebar-toggle-btn" aria-label="Toggle menu">
  <span></span>
  <span></span>
  <span></span>
</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="../index.html" class="sidebar-logo">Assemble<span>AtEase</span></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <ul class="sidebar-nav">
        <li><a href="index.html" class="active"><span class="nav-icon">&#8962;</span> Dashboard</a></li>
        <li><a href="post-job.html"><span class="nav-icon">&#43;</span> Post a Job</a></li>
        <li><a href="my-jobs.html"><span class="nav-icon">&#128203;</span> My Jobs</a></li>
        <li><a href="browse-assemblers.html"><span class="nav-icon">&#128101;</span> Browse Assemblers</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile.html"><span class="nav-icon">&#9881;</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">&#8594;</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main">
    <div class="page-header">
      <div>
        <h1 id="welcome-msg">Welcome back</h1>
        <p>Here is what is happening with your jobs today.</p>
      </div>
      <a href="post-job.html" class="btn btn-primary">+ &nbsp;Post a Job</a>
    </div>

    <div id="page-alert" class="alert hidden"></div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="skeleton" style="height:72px"></div></div>
      <div class="stat-card"><div class="skeleton" style="height:72px"></div></div>
      <div class="stat-card"><div class="skeleton" style="height:72px"></div></div>
      <div class="stat-card"><div class="skeleton" style="height:72px"></div></div>
    </div>

    <div class="content-grid">
      <div>
        <div class="section-hdr">
          <h3>Your Recent Jobs</h3>
          <a href="my-jobs.html" class="btn btn-ghost btn-sm">View all</a>
        </div>
        <div id="jobs-list">
          <div class="skeleton-card"><div class="skeleton" style="height:64px"></div></div>
          <div class="skeleton-card"><div class="skeleton" style="height:64px"></div></div>
          <div class="skeleton-card"><div class="skeleton" style="height:64px"></div></div>
        </div>
      </div>
      <div>
        <div class="section-hdr">
          <h3>Assemblers Near You</h3>
          <a href="browse-assemblers.html" class="btn btn-ghost btn-sm">Browse all</a>
        </div>
        <div id="assemblers-list">
          <div class="skeleton-card"><div class="skeleton" style="height:64px"></div></div>
          <div class="skeleton-card"><div class="skeleton" style="height:64px"></div></div>
          <div class="skeleton-card"><div class="skeleton" style="height:64px"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  function timeAgo(d) {
    const diff = Date.now() - new Date(d).getTime(), days = Math.floor(diff/86400000);
    if (days===0) return 'Today'; if (days===1) return 'Yesterday'; return days+'d ago';
  }

  document.addEventListener('DOMContentLoaded', async () => {
    APP.initMobileMenu();
    const auth = await APP.requireAuth(['customer']);
    if (!auth) return;
    const { user, profile } = auth;

    document.getElementById('welcome-msg').textContent =
      'Welcome back, ' + (profile.full_name?.split(' ')[0] || 'there');

    document.getElementById('sidebar-logout')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '../index.html';
    });

    // Stats
    try {
      const s = await API.getCustomerStats(user.id) || {};
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card accent-top"><div class="stat-value">${s.totalJobs??0}</div><div class="stat-label">Jobs Posted</div></div>
        <div class="stat-card"><div class="stat-value">${s.openJobs??0}</div><div class="stat-label">Open</div></div>
        <div class="stat-card teal-top"><div class="stat-value">${s.inProgress??0}</div><div class="stat-label">In Progress</div></div>
        <div class="stat-card"><div class="stat-value">${s.completed??0}</div><div class="stat-label">Completed</div></div>`;
    } catch (err) {
      console.error('Stats error:', err);
      document.getElementById('stats-grid').innerHTML = '<div style="grid-column:1/-1"><div class="error-state"><span>⚠️</span>Could not load stats. Check console.</div></div>';
    }

    // Recent jobs
    try {
      const { data: jobs, error } = await API.getJobs({ customerId: user.id, limit: 5 });
      if (error) throw error;
      const jl = document.getElementById('jobs-list');
      if (jobs?.length) {
        jl.innerHTML = jobs.map(job => {
          const bc = job.bids?.[0]?.count ?? 0;
          return `<a class="item-card" href="job-detail.html?id=${job.id}">
            <div class="item-card-top"><h4>${job.title}</h4><span class="badge ${APP.getBadgeClass(job.status)}">${job.status.replace('_',' ')}</span></div>
            <div class="item-card-desc">${APP.truncate(job.description,80)}</div>
            <div class="item-card-meta">${bc} bid${bc!==1?'s':''} &middot; ${timeAgo(job.created_at)}</div>
          </a>`;
        }).join('');
      } else {
        jl.innerHTML = '<div class="empty-state"><p>No jobs posted yet.</p><a href="post-job.html" class="btn btn-primary btn-sm">Post your first job</a></div>';
      }
    } catch (err) {
      console.error('Jobs error:', err);
      document.getElementById('jobs-list').innerHTML = '<div class="error-state"><span>⚠️</span>Could not load jobs. Check console.</div>';
    }

    // Assemblers
    try {
      const { data: assemblers } = await API.getAssemblers({ city: profile.city||undefined, limit: 5 });
      const al = document.getElementById('assemblers-list');
      if (assemblers?.length) {
        al.innerHTML = assemblers.map(a => {
          const ini = (a.full_name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
          return `<a class="item-card" href="assembler-detail.html?id=${a.id}">
            <div style="display:flex;align-items:center;gap:10px">
              <div class="avatar-sm">${ini}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:0.9rem;font-weight:500;color:var(--ink)">${a.full_name||'Assembler'}</div>
                <div style="font-size:0.78rem;color:var(--muted)">
                  ${a.rating?'&#9733; '+Number(a.rating).toFixed(1)+' &middot; ':''} ${a.completed_jobs||0} jobs ${a.city?' &middot; '+a.city:''}
                </div>
              </div>
              ${a.hourly_rate?`<div style="font-size:0.82rem;font-weight:500;color:var(--teal);flex-shrink:0">$${a.hourly_rate}/hr</div>`:''}
            </div>
          </a>`;
        }).join('');
      } else {
        al.innerHTML = '<div class="empty-state"><p>No assemblers nearby yet.</p><a href="browse-assemblers.html" class="btn btn-ghost btn-sm">Browse all</a></div>';
      }
    } catch (err) {
      console.error('Assemblers error:', err);
      document.getElementById('assemblers-list').innerHTML = '<div class="error-state"><span>⚠️</span>Could not load assemblers. Check console.</div>';
    }
  });
</script>
</body>
</html>
