<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1916; --ink-soft: #3d3b35; --muted: #9b9789;
      --border: #e4e1d9; --off-white: #f8f7f4; --white: #ffffff;
      --accent: #e86a2e; --accent-dark: #c45520; --accent-light: #fdf0e8;
      --teal: #1d9e75; --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; -webkit-font-smoothing: antialiased; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--ink); text-decoration: none; display: block; margin-bottom: 2rem; }
    .logo span { color: var(--accent); }
    h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--ink); margin-bottom: 0.4rem; }
    .sub { font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--ink-soft); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink); background: var(--white); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,106,46,0.1); }
    .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 0.85rem; border-radius: 999px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.18s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 0.85rem 1rem; border-radius: var(--radius); font-size: 0.875rem; margin-bottom: 1.25rem; display: none; }
    .alert.show { display: block; }
    .alert-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); text-decoration: none; transition: color 0.15s; }
    .back-link:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div class="card">
    <a href="../index.html" class="logo">Assemble<span>AtEase</span></a>
    <h1>Reset your password</h1>
    <p class="sub">Enter your email address and we will send you a link to reset your password.</p>

    <div id="alert" class="alert"></div>

    <div id="form-wrap">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
      </div>
      <button class="btn btn-primary" id="reset-btn" type="button">Send reset link</button>
    </div>

    <a href="login.html" class="back-link">&#8592; Back to login</a>
  </div>

<script>
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
  }

  document.getElementById('reset-btn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) {
      showAlert('Please enter your email address.', 'error');
      return;
    }

    const btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      if (!window.supabaseClient) throw new Error('Connection error. Please refresh.');

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/auth/login.html',
      });

      if (error) throw error;

      showAlert('Reset link sent! Check your email inbox.', 'success');
      document.getElementById('form-wrap').style.opacity = '0.5';
      document.getElementById('form-wrap').style.pointerEvents = 'none';

    } catch (err) {
      showAlert(err.message || 'Failed to send reset email. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    }
  });

  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('reset-btn').click();
  });
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/245917212.js"></script>
</body>
</html>
