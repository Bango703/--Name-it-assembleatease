<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Jobs — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <style>
    .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .filter-tab {
      padding: 0.4rem 1rem; border-radius: 999px;
      font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--white); color: var(--ink-soft);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active { background: var(--accent-light); color: var(--accent); border-color: rgba(232,106,46,0.3); }

    .job-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none; display: block;
    }
    .job-card:hover { border-color: #c8c4bb; box-shadow: var(--shadow-sm); }
    .job-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.5rem; }
    .job-card h3 { font-size: 0.95rem; font-weight: 500; color: var(--ink); }
    .job-card-meta { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }
    .job-card-desc { font-size: 0.875rem; color: var(--ink-soft); line-height: 1.6; margin: 0.4rem 0 0.6rem; }
    .job-card-footer { display: flex; align-items: center; gap: 1rem; font-size: 0.78rem; color: var(--muted); flex-wrap: wrap; }
    .bid-count { font-size: 0.82rem; color: var(--teal); font-weight: 500; }
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="../index.html" class="sidebar-logo">Assemble<span>AtEase</span></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <ul class="sidebar-nav">
        <li><a href="index.html"><span class="nav-icon">&#8962;</span> Dashboard</a></li>
        <li><a href="browse-assemblers.html"><span class="nav-icon">&#128101;</span> Browse Assemblers</a></li>
        <li><a href="post-job.html"><span class="nav-icon">&#43;</span> Post a Job</a></li>
        <li><a href="my-jobs.html" class="active"><span class="nav-icon">&#128203;</span> My Jobs</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile.html"><span class="nav-icon">&#9881;</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">&#8594;</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main">
    <div class="page-header">
      <div>
        <h1>My Jobs</h1>
        <p>Manage and track all your posted jobs.</p>
      </div>
      <a href="post-job.html" class="btn btn-primary">+ &nbsp;Post a New Job</a>
    </div>

    <div id="page-alert" class="alert hidden"></div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-status="all">All jobs</button>
      <button class="filter-tab" data-status="open">Open</button>
      <button class="filter-tab" data-status="assigned">Assigned</button>
      <button class="filter-tab" data-status="in_progress">In Progress</button>
      <button class="filter-tab" data-status="completed">Completed</button>
    </div>

    <div id="jobs-list">
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
    </div>
  </main>
</div>

<script>
  let allJobs = [];

  function timeAgo(d) {
    if (!d) return '';
    const diff = Date.now() - new Date(d).getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return 'Yesterday';
    return days + 'd ago';
  }

  function renderJobs(jobs) {
    const list = document.getElementById('jobs-list');
    if (!jobs?.length) {
      list.innerHTML = `<div class="empty-state"><p>No jobs found.</p><a href="post-job.html" class="btn btn-primary btn-sm">Post your first job</a></div>`;
      return;
    }
    list.innerHTML = jobs.map(job => {
      const bidCount = job.bids?.[0]?.count ?? 0;
      const badgeClass = APP.getBadgeClass(job.status);
      const budget = job.budget_min && job.budget_max ? `$${job.budget_min}–$${job.budget_max}` : 'Budget TBD';
      return `
        <a class="job-card" href="job-detail.html?id=${job.id}">
          <div class="job-card-top">
            <div>
              <h3>${job.title}</h3>
              <div class="job-card-meta">${job.category || 'General'} &middot; ${job.city || 'Location TBD'}</div>
            </div>
            <div style="display:flex;align-items:center;gap:0.6rem;flex-shrink:0">
              <span class="bid-count">${bidCount} bid${bidCount !== 1 ? 's' : ''}</span>
              <span class="badge ${badgeClass}">${job.status.replace('_', ' ')}</span>
            </div>
          </div>
          <div class="job-card-desc">${APP.truncate(job.description, 120)}</div>
          <div class="job-card-footer">
            <span>${budget}</span>
            <span>${job.schedule || 'Flexible'}</span>
            <span>Posted ${timeAgo(job.created_at)}</span>
          </div>
        </a>`;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const auth = await APP.requireAuth(['customer']);
    if (!auth) return;
    const { user } = auth;

    document.getElementById('sidebar-logout')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '../index.html';
    });

    document.getElementById('filter-tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const status = tab.dataset.status;
      renderJobs(status === 'all' ? allJobs : allJobs.filter(j => j.status === status));
    });

    try {
      const { data, error } = await API.getJobs({ customerId: user.id, limit: 100 });
      if (error) throw error;
      allJobs = data || [];
      renderJobs(allJobs);
    } catch (err) {
      document.getElementById('jobs-list').innerHTML =
        `<div class="error-state"><span>&#9888;</span>Could not load jobs. Please refresh.</div>`;
    }
  });
</script>
</body>
</html>
