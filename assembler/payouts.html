<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Earnings — Easer</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AE Easer" />
  <meta name="theme-color" content="#00BFFF" />
  <link rel="apple-touch-icon" href="/images/logo.jpg" />
  <style>body{visibility:hidden}</style>
  <link rel="stylesheet" href="../assets/css/easer.css" />
  <link rel="stylesheet" href="../assets/status.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js" integrity="sha384-rwykjmWNwVxboyFmvK9OXN0wj9hnMHA2aAHtits54DuACyCq0M2PrSNxhRb+hvXT" crossorigin="anonymous" defer></script>
  <script src="../config.js" defer></script>
  <script src="../assets/js/app.js" defer></script>
  <style>
    :root{--pro-bg:#f8fafc;--pro-surface:#ffffff;--pro-elevated:#f1f5f9;--pro-border:#e2e8f0;--pro-border-md:#cbd5e1;--pro-text:#0d1117;--pro-muted:#64748b;--pro-soft:#374151;--pro-teal:#00BFFF;--pro-teal-dim:rgba(0,191,255,0.08);--teal:#00BFFF}
    .logout-link{font-size:0.72rem;color:var(--e-muted);text-decoration:none;font-weight:500;white-space:nowrap;padding:0.4rem 0}
    .logout-link:hover{color:var(--e-text)}
    /* Earnings-specific styles */
    .earn-tx-list { display: flex; flex-direction: column; gap: 0; }
    .earn-tx-row {
      display: flex; align-items: center; gap: 0.875rem;
      padding: 0.875rem 0; border-bottom: 1px solid var(--pro-border);
    }
    .earn-tx-row:last-child { border-bottom: none; }
    .earn-tx-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .earn-tx-icon.paid   { background: rgba(5,150,105,0.1);  color: #059669; }
    .earn-tx-icon.pending{ background: rgba(245,158,11,0.1); color: #d97706; }
    .earn-tx-info  { flex: 1; min-width: 0; }
    .earn-tx-name  { font-size: 0.88rem; font-weight: 600; color: var(--pro-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .earn-tx-date  { font-size: 0.72rem; color: var(--pro-muted); margin-top: 2px; }
    .earn-tx-right { text-align: right; flex-shrink: 0; }
    .earn-tx-amount { font-size: 1rem; font-weight: 700; color: var(--pro-text); line-height: 1; }
    .earn-tx-amount.paid { color: #059669; }
    .earn-tx-status { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
    .earn-tx-status.paid    { color: #059669; }
    .earn-tx-status.pending { color: #d97706; }
    .earn-summary-box {
      background: var(--pro-elevated); border-radius: 12px;
      padding: 1rem 1.25rem; margin-top: 1rem;
    }
    .earn-summary-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.85rem; padding: 0.35rem 0; color: var(--pro-soft);
    }
    .earn-summary-row.total {
      border-top: 1px solid var(--pro-border-md); padding-top: 0.6rem;
      margin-top: 0.25rem; font-weight: 700; color: var(--pro-text);
    }
  </style>
</head>
<body class="theme-pro">

<div class="e-offline" id="e-offline">No connection — updates paused</div>

<header class="easer-header">
  <a href="/assembler/" class="easer-wordmark" aria-label="Easer home">
    <span class="easer-wordmark-text">Easer</span>
  </a>
  <button class="eh-bell-btn" aria-label="Notifications" id="eh-bell-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span class="eh-bell-badge" id="eh-bell-badge" style="display:none">0</span>
  </button>
</header>
<div id="notif-backdrop" style="display:none;position:fixed;inset:0;top:calc(var(--e-header-h) + var(--e-safe-top));z-index:1499;background:rgba(0,0,0,0.2)" onclick="document.getElementById('notif-panel').style.display='none';this.style.display='none'"></div>
<div id="notif-panel" style="display:none;position:fixed;top:calc(var(--e-header-h) + var(--e-safe-top));right:0;left:0;background:#fff;border-bottom:1px solid var(--e-border);z-index:1500;padding:1rem 1.25rem calc(1rem + var(--e-safe-bottom));max-height:calc(100dvh - (var(--e-header-h) + var(--e-safe-top)) - var(--e-safe-bottom));overflow:auto;box-shadow:0 4px 16px rgba(0,0,0,0.08)">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
    <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--e-muted)">Notifications</div>
    <button onclick="document.getElementById('notif-panel').style.display='none';document.getElementById('notif-backdrop').style.display='none'" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--e-muted);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent" aria-label="Close notifications"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div style="text-align:center;padding:1.5rem 0;color:var(--e-muted);font-size:0.875rem">No new notifications</div>
</div>

<div class="easer-page">
  <a href="#" id="sidebar-logout" style="display:none"></a>
  <div id="page-alert" class="alert hidden"></div>

  <div class="e-period-tabs" id="period-tabs">
    <button class="e-period-tab active" data-period="all">All Time</button>
    <button class="e-period-tab" data-period="month">This Month</button>
    <button class="e-period-tab" data-period="week">This Week</button>
  </div>

  <div class="e-earn-hero-card" id="summary-bar">
    <div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.65)">Total Earned</div>
    <div class="e-earn-total" id="earn-total-val" style="min-height:2.75rem"></div>
    <div class="e-earn-split" id="earn-split">
      <div class="e-earn-split-item"><strong>—</strong><span>Jobs</span></div>
      <div class="e-earn-split-item"><strong>—</strong><span>Paid Out</span></div>
      <div class="e-earn-split-item"><strong>—</strong><span>Pending</span></div>
    </div>
  </div>

  <div id="payouts-list">
    <div class="e-skeleton-card"><div class="e-skeleton" style="height:80px"></div></div>
    <div class="e-skeleton-card"><div class="e-skeleton" style="height:80px"></div></div>
  </div>
</div>

<nav class="easer-nav">
  <a href="/assembler/" class="easer-nav-item">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </a>
  <a href="/assembler/my-assignments" class="easer-nav-item">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Jobs</span>
  </a>
  <a href="/assembler/payouts" class="easer-nav-item active">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    <span>Earnings</span>
  </a>
  <a href="/assembler/profile" class="easer-nav-item">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
</nav>

<script>
  var allCompleted = [];

  function fmt(cents) {
    if (!cents && cents !== 0) return '—';
    return '$' + (cents / 100).toFixed(2);
  }
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function filterByPeriod(list, period) {
    if (period === 'all') return list;
    var now = new Date();
    if (period === 'week') {
      var cutoff = new Date(now - 7 * 86400000);
      return list.filter(function(b){ return b.completed_at && new Date(b.completed_at) >= cutoff; });
    }
    if (period === 'month') {
      var cutoff = new Date(now.getFullYear(), now.getMonth(), 1);
      return list.filter(function(b){ return b.completed_at && new Date(b.completed_at) >= cutoff; });
    }
    return list;
  }

  function renderEarnings(list) {
    var totalEarned  = list.reduce(function(s, b){ return s + (b.payout_amount || 0); }, 0);
    var totalPaid    = list.filter(function(b){ return b.payout_status === 'paid'; }).reduce(function(s,b){ return s + (b.payout_amount || 0); }, 0);
    var totalPending = list.filter(function(b){ return b.payout_status !== 'paid'; }).reduce(function(s,b){ return s + (b.payout_amount || 0); }, 0);

    document.getElementById('earn-total-val').textContent = fmt(totalEarned);
    document.getElementById('earn-split').innerHTML =
      '<div class="e-earn-split-item"><strong>' + list.length + '</strong><span>Jobs</span></div>' +
      '<div class="e-earn-split-item"><strong>' + fmt(totalPaid) + '</strong><span>Paid Out</span></div>' +
      '<div class="e-earn-split-item"><strong>' + fmt(totalPending) + '</strong><span>Pending</span></div>';

    var el = document.getElementById('payouts-list');
    if (!list.length) {
      el.innerHTML = '<div class="e-empty"><div class="e-empty-title">No earnings in this period</div><div class="e-empty-desc">Complete a job to see your earnings here.</div></div>';
      return;
    }

    var checkIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
    var clockIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

    var rows = list.slice().reverse().map(function(b) {
      var isPaid = b.payout_status === 'paid';
      var isZero = !b.payout_amount;
      return '<div class="earn-tx-row">' +
        '<div class="earn-tx-icon ' + (isPaid ? 'paid' : 'pending') + '">' + (isPaid ? checkIcon : clockIcon) + '</div>' +
        '<div class="earn-tx-info">' +
          '<div class="earn-tx-name">' + esc(b.service || 'Service') + '</div>' +
          '<div class="earn-tx-date">' + fmtDate(b.completed_at) + '</div>' +
          (b.source === 'ledger' ? '<div style="font-size:0.68rem;color:#64748b;margin-top:2px;line-height:1.4">Recorded in payout ledger</div>' : '') +
          (isZero && !isPaid ? '<div style="font-size:0.68rem;color:#d97706;margin-top:2px;line-height:1.4">Payout amount pending — will be confirmed by our team.</div>' : '') +
        '</div>' +
        '<div class="earn-tx-right">' +
          '<div class="earn-tx-amount ' + (isPaid ? 'paid' : '') + '">' + fmt(b.payout_amount) + '</div>' +
          '<div class="earn-tx-status ' + (isPaid ? 'paid' : 'pending') + '">' + (isPaid ? 'Paid' : 'Pending') + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    var feePct = list.length && list[0].platform_fee_pct ? list[0].platform_fee_pct : 25;
    var memberNote = feePct >= 25
      ? '<div style="text-align:center;margin-top:1rem;font-size:0.72rem;color:var(--pro-muted)">'
        + 'Earn more with <a href="/assembler/profile#membership-section" style="color:var(--pro-teal);font-weight:600">Priority Membership</a>'
        + '</div>'
      : '';

    el.innerHTML = '<div style="background:#fff;border:1px solid var(--pro-border);border-radius:14px;padding:0 1rem"><div class="earn-tx-list">' + rows + '</div></div>' + memberNote;
  }

  document.addEventListener('DOMContentLoaded', async function() {
    const auth = await APP.requireAuth(["assembler"]);
    if (!auth) return;
    document.body.style.visibility = 'visible';
    const session = auth.session;

    // getToken with expiry check — refreshes automatically if JWT is stale
    async function getToken() {
      try {
        const { data: { session: s } } = await supabaseClient.auth.getSession();
        if (s?.access_token) {
          const now = Math.floor(Date.now() / 1000);
          if (!s.expires_at || s.expires_at > now + 60) return s.access_token;
        }
        const { data: refreshed } = await supabaseClient.auth.refreshSession();
        if (refreshed?.session?.access_token) return refreshed.session.access_token;
      } catch {}
      return session.access_token;
    }

    var offlineBanner = document.getElementById('e-offline');
    window.addEventListener('offline', function() { if (offlineBanner) offlineBanner.classList.add('show'); });
    window.addEventListener('online',  function() { if (offlineBanner) offlineBanner.classList.remove('show'); });

    // Notification bell
    var _notifPanel = document.getElementById('notif-panel');
    var _notifBackdrop = document.getElementById('notif-backdrop');
    function showNotif(){_notifPanel.style.display='block';if(_notifBackdrop)_notifBackdrop.style.display='block';}
    function hideNotif(){_notifPanel.style.display='none';if(_notifBackdrop)_notifBackdrop.style.display='none';}
    document.getElementById('eh-bell-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      _notifPanel.style.display === 'none' ? showNotif() : hideNotif();
    });
    document.addEventListener('click', function() { if (_notifPanel && _notifPanel.style.display !== 'none') hideNotif(); });

    document.getElementById('sidebar-logout').addEventListener('click', async function(e) {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '/auth/login.html';
    });

    // Period tab switching
    document.getElementById('period-tabs').addEventListener('click', function(e) {
      var tab = e.target.closest('.e-period-tab');
      if (!tab) return;
      document.querySelectorAll('.e-period-tab').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      renderEarnings(filterByPeriod(allCompleted, tab.dataset.period));
    });

    try {
      let token = await getToken();
      if (!token) { window.location.href = '/auth/login.html'; return; }
      let resp = await fetch('/api/assembler/payout-history', {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      // On 401: force-refresh once and retry before redirecting
      if (resp.status === 401) {
        try {
          const { data: rd } = await supabaseClient.auth.refreshSession();
          if (rd?.session?.access_token) {
            token = rd.session.access_token;
            resp = await fetch('/api/assembler/payout-history', { headers: { 'Authorization': 'Bearer ' + token } });
          }
        } catch {}
        if (resp.status === 401) { window.location.href = '/auth/login.html'; return; }
      }
      if (!resp.ok) throw new Error('Failed to load');
      const data = await resp.json();
      allCompleted = data.entries || [];
      renderEarnings(allCompleted);
    } catch (err) {
      document.getElementById('payouts-list').innerHTML =
        '<div class="e-alert error show">Could not load earnings history. Please refresh.</div>';
    }
  });
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/245917212.js"></script>
</body>
</html>
