<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" /></noscript>
  <script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js" integrity="sha384-rwykjmWNwVxboyFmvK9OXN0wj9hnMHA2aAHtits54DuACyCq0M2PrSNxhRb+hvXT" crossorigin="anonymous" defer></script>
  <script src="../config.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; -webkit-font-smoothing: antialiased; }
    .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: #0d1117; text-decoration: none; display: block; text-align: center; margin-bottom: 2rem; }
    .logo span { color: #0097a7; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 1.75rem; color: #0d1117; margin-bottom: 0.4rem; text-align: center; }
    .sub { font-size: 0.9rem; color: #64748b; margin-bottom: 2rem; line-height: 1.6; text-align: center; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: #4a5568; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: #0d1117; background: #ffffff; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .form-control:focus { border-color: #0097a7; box-shadow: 0 0 0 3px rgba(0,151,167,0.1); }
    .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 0.85rem; border-radius: 999px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.18s; }
    .btn-primary { background: #0097a7; color: #fff; }
    .btn-primary:hover { background: #00838f; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 0.85rem 1rem; border-radius: 10px; font-size: 0.875rem; margin-bottom: 1.25rem; display: none; }
    .alert.show { display: block; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #0097a7; text-decoration: none; transition: color 0.15s; }
    .back-link:hover { color: #00838f; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <a href="../index" class="logo">Assemble<span>AtEase</span></a>
    <h1>Reset your password</h1>
    <p class="sub">Enter your email address and we will send you a link to reset your password.</p>

    <div id="alert" class="alert"></div>

    <div id="form-wrap">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
      </div>
      <button class="btn btn-primary" id="reset-btn" type="button">Send reset link</button>
    </div>

    <a href="login" class="back-link">&#8592; Back to login</a>
  </div>

<script>
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
  }

  document.getElementById('reset-btn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) {
      showAlert('Please enter your email address.', 'error');
      return;
    }

    const btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      // Wait up to 5s for Supabase to initialise (CDN can be slow)
      let attempts = 0;
      while (!window.supabaseClient && attempts < 50) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }
      // Fallback: create client inline if config.js hasn't run yet
      if (!window.supabaseClient && window.supabase?.createClient) {
        window.supabaseClient = window.supabase.createClient(
          'https://ukamyqnaukxlmeoncjgr.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrYW15cW5hdWt4bG1lb25jamdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDUzMDMsImV4cCI6MjA5MTMyMTMwM30.WMLkxSGm5mnvGfx7gcvf7UKfefjxQf8yOZvk_HzZQNY'
        );
      }
      if (!window.supabaseClient) {
        showAlert('Could not connect. Please refresh the page and try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Send reset link';
        return;
      }

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/auth/set-password',
      });

      if (error) throw error;

      showAlert('Reset link sent! Check your email inbox.', 'success');
      document.getElementById('form-wrap').style.opacity = '0.5';
      document.getElementById('form-wrap').style.pointerEvents = 'none';

    } catch (err) {
      showAlert(err.message || 'Failed to send reset email. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    }
  });

  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('reset-btn').click();
  });
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="https://js-na2.hs-scripts.com/245917212.js"></script>
</body>
</html>
