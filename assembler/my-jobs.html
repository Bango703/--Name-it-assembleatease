<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Jobs — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <style>
    .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    body.theme-pro .filter-tab {
      padding: 0.4rem 1rem; border-radius: 999px;
      font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--pro-border-md);
      background: var(--pro-surface); color: var(--pro-soft);
      cursor: pointer; transition: all 0.15s;
    }
    body.theme-pro .filter-tab:hover { border-color: var(--pro-teal); color: var(--pro-teal); }
    body.theme-pro .filter-tab.active { background: rgba(0,188,212,0.1); color: var(--pro-teal); border-color: rgba(0,188,212,0.3); }
    body.theme-pro .job-card {
      background: var(--pro-surface); border: 1px solid var(--pro-border);
      border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem;
      cursor: pointer; transition: all 0.15s; text-decoration: none; display: block;
    }
    body.theme-pro .job-card:hover { border-color: var(--pro-border-md); background: var(--pro-elevated); }
    body.theme-pro .job-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.5rem; }
    body.theme-pro .job-card h3 { font-size: 1rem; font-weight: 500; color: var(--pro-text); }
    body.theme-pro .job-card-meta { font-size: 0.82rem; color: var(--pro-muted); margin-top: 0.2rem; }
    body.theme-pro .job-card-desc { font-size: 0.875rem; color: var(--pro-muted); line-height: 1.6; margin: 0.4rem 0 0.6rem; }
    body.theme-pro .job-card-footer { display: flex; align-items: center; gap: 1rem; font-size: 0.78rem; color: var(--pro-muted); flex-wrap: wrap; }
    body.theme-pro .budget-tag { font-size: 0.82rem; font-weight: 500; color: var(--pro-teal); }
  </style>
</head>
<body class="theme-pro">
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="../index.html" class="sidebar-logo">Assemble<span>AtEase</span></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Workspace</div>
      <ul class="sidebar-nav">
        <li><a href="/"><span class="nav-icon">&#9889;</span> Dashboard</a></li>
        <li><a href="browse-jobs.html"><span class="nav-icon">&#128269;</span> Browse Jobs</a></li>
        <li><a href="my-bids.html"><span class="nav-icon">&#128172;</span> My Bids</a></li>
        <li><a href="my-jobs.html" class="active"><span class="nav-icon">&#128295;</span> My Jobs</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile.html"><span class="nav-icon">&#128100;</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">&#128682;</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main" style="padding:2rem">
    <div class="page-header" style="margin-bottom:1.5rem">
      <div>
        <h1>My Jobs</h1>
        <p>Jobs assigned to you. Track progress and manage active work.</p>
      </div>
    </div>

    <div id="page-alert" class="alert hidden"></div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-status="all">All jobs</button>
      <button class="filter-tab" data-status="assigned">Assigned</button>
      <button class="filter-tab" data-status="in_progress">In Progress</button>
      <button class="filter-tab" data-status="completed">Completed</button>
    </div>

    <div id="jobs-list">
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
    </div>
  </main>
</div>

<script>
  let allJobs = [];

  function timeAgo(d) {
    if (!d) return '';
    const diff = Date.now() - new Date(d).getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return 'Yesterday';
    return days + 'd ago';
  }

  function formatBudget(job) {
    if (!job.budget_min && !job.budget_max) return 'Budget TBD';
    if (job.budget_min && job.budget_max) return '$' + job.budget_min + '\u2013$' + job.budget_max;
    if (job.budget_max) return 'Up to $' + job.budget_max;
    return 'From $' + job.budget_min;
  }

  function renderJobs(jobs) {
    const list = document.getElementById('jobs-list');
    if (!jobs || !jobs.length) {
      list.innerHTML = '<div class="empty-state"><p>No jobs found. Browse open jobs and submit bids to get started.</p><a href="browse-jobs.html" class="btn btn-teal btn-sm">Browse Jobs</a></div>';
      return;
    }
    list.innerHTML = jobs.map(function(job) {
      const badgeClass = APP.getBadgeClass(job.status);
      const customer = job.customer || {};
      const amount = job.agreed_amount ? '$' + job.agreed_amount : formatBudget(job);
      return '<a class="job-card" href="job-detail.html?id=' + job.id + '">' +
        '<div class="job-card-top">' +
          '<div>' +
            '<h3>' + (job.title || 'Untitled Job') + '</h3>' +
            '<div class="job-card-meta">' + (job.category || 'General') + ' &middot; ' + (job.city || 'Location TBD') + '</div>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:0.6rem;flex-shrink:0">' +
            '<span class="budget-tag">' + amount + '</span>' +
            '<span class="badge ' + badgeClass + '">' + job.status.replace('_', ' ') + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="job-card-desc">' + APP.truncate(job.description, 120) + '</div>' +
        '<div class="job-card-footer">' +
          '<span>Customer: ' + (customer.full_name || 'Unknown') + '</span>' +
          '<span>' + (job.schedule || 'Flexible') + '</span>' +
          '<span>Assigned ' + timeAgo(job.updated_at || job.created_at) + '</span>' +
        '</div>' +
      '</a>';
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', async function() {
    const auth = await APP.requireAuth(['assembler']);
    if (!auth) return;
    const user = auth.user;

    document.getElementById('sidebar-logout').addEventListener('click', async function(e) {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '../index.html';
    });

    document.getElementById('filter-tabs').addEventListener('click', function(e) {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      const status = tab.dataset.status;
      renderJobs(status === 'all' ? allJobs : allJobs.filter(function(j) { return j.status === status; }));
    });

    try {
      const result = await API.getJobs({ assemblerId: user.id, limit: 100 });
      if (result.error) throw result.error;
      allJobs = result.data || [];
      renderJobs(allJobs);
    } catch (err) {
      document.getElementById('jobs-list').innerHTML =
        '<div class="error-state"><span>&#9888;</span>Could not load jobs. Please refresh.</div>';
    }
  });
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/245917212.js"></script>
</body>
</html>
