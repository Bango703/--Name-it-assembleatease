<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Bids — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <script src="../assets/js/supabase.js" defer></script>
</head>
<body>
<nav class="nav" id="main-nav"></nav>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <ul class="sidebar-nav">
        <li><a href="index.html"><span class="nav-icon">🏠</span> Dashboard</a></li>
        <li><a href="browse-jobs.html"><span class="nav-icon">🔍</span> Browse Jobs</a></li>
        <li><a href="my-bids.html" class="active"><span class="nav-icon">💬</span> My Bids</a></li>
        <li><a href="my-jobs.html"><span class="nav-icon">🔧</span> My Jobs</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile.html"><span class="nav-icon">⭐</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">🚪</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main">
    <div class="page-header flex-between">
      <div>
        <h1>My Bids</h1>
        <p>Track all your submitted bids and responses.</p>
      </div>
      <a href="browse-jobs.html" class="btn btn-primary">🔍 &nbsp; Browse Jobs</a>
    </div>

    <!-- Filters -->
    <div class="card" style="padding:16px;margin-bottom:24px;display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm filter-btn active" data-status="all">All</button>
      <button class="btn btn-ghost btn-sm filter-btn" data-status="pending">Pending</button>
      <button class="btn btn-ghost btn-sm filter-btn" data-status="accepted">Accepted</button>
      <button class="btn btn-ghost btn-sm filter-btn" data-status="rejected">Rejected</button>
      <button class="btn btn-ghost btn-sm filter-btn" data-status="withdrawn">Withdrawn</button>
    </div>

    <!-- Bids List -->
    <div id="bids-list">
      <div class="text-center" style="padding:64px;color:var(--text-secondary)">
        <div class="spinner spinner-lg" style="margin:0 auto 16px"></div>
        <p>Loading your bids...</p>
      </div>
    </div>
  </main>
</div>

<script>
let allBids = [];
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', async () => {
  const auth = await APP.requireAuth(['assembler']);
  if (!auth) return;
  const { user } = auth;
  await APP.buildNav('assembler');
  APP.setActiveSidebarLink();

  document.getElementById('sidebar-logout')?.addEventListener('click', async (e) => {
    e.preventDefault();
    await supabaseClient.auth.signOut();
    window.location.href = '../index.html';
  });

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.status;
      renderBids();
    });
  });

  loadBids(user.id);
});

async function loadBids(assemblerId) {
  const { data, error } = await API.getMyBids(assemblerId);

  if (error) {
    document.getElementById('bids-list').innerHTML = '<div class="card text-center" style="padding:64px"><p>Error loading bids: ' + error.message + '</p></div>';
    return;
  }

  allBids = data || [];
  renderBids();
}

function renderBids() {
  const filtered = currentFilter === 'all' 
    ? allBids 
    : allBids.filter(b => b.status === currentFilter);

  const bidsList = document.getElementById('bids-list');

  if (!filtered.length) {
    bidsList.innerHTML = '<div class="card text-center" style="padding:64px"><p>No bids yet. <a href="browse-jobs.html">Browse jobs to submit a bid!</a></p></div>';
    return;
  }

  bidsList.innerHTML = filtered.map(bid => `
    <div class="card" style="padding:20px;margin-bottom:16px;cursor:pointer;transition:all 0.3s" onmouseover="this.style.boxShadow='0 8px 24px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow=''" onclick="window.location.href='bid-detail.html?id=${bid.id}'">
      <div class="flex-between mb-12">
        <div>
          <h3 style="margin:0">${bid.job?.title || 'Job'}</h3>
          <div style="font-size:0.85rem;color:var(--text-secondary);margin-top:2px">
            by ${bid.job?.customer?.full_name || 'Customer'} • ${bid.job?.city || 'Location TBD'}
          </div>
        </div>
        <div style="text-align:right">
          <span class="badge" style="background:${
            bid.status === 'pending' ? 'var(--orange)' : 
            bid.status === 'accepted' ? 'var(--teal-light)' : 
            bid.status === 'rejected' ? 'var(--text-muted)' :
            'var(--border)'
          };padding:6px 12px;border-radius:4px;font-weight:600;font-size:0.85rem;color:white">
            ${bid.status.toUpperCase()}
          </span>
        </div>
      </div>

      <div style="background:rgba(13,148,136,0.05);padding:12px;border-radius:6px;margin:12px 0">
        <div style="font-size:0.8rem;color:var(--text-secondary)">Your bid</div>
        <div style="font-size:1.2rem;font-weight:700;color:var(--teal)">$${bid.proposed_amount || 'TBD'}</div>
      </div>

      <p style="color:var(--text-secondary);margin:12px 0;font-size:0.9rem">${bid.message?.substring(0, 100) || 'No message'}...</p>

      <div style="font-size:0.85rem;color:var(--text-muted);padding-top:12px;border-top:1px solid var(--border);margin-top:12px">
        Submitted ${new Date(bid.created_at).toLocaleDateString()}
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
