<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Bids — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <style>
    body.theme-pro .bid-card {
      background: var(--pro-surface); border: 1px solid var(--pro-border);
      border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem;
      cursor: pointer; transition: all 0.15s; display: block; text-decoration: none;
    }
    body.theme-pro .bid-card:hover { border-color: var(--pro-border-md); background: var(--pro-elevated); }
    body.theme-pro .bid-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.4rem; }
    body.theme-pro .bid-card h3 { font-size: 0.95rem; font-weight: 500; color: var(--pro-text); }
    body.theme-pro .bid-card-desc { font-size: 0.85rem; color: var(--pro-muted); line-height: 1.55; margin-bottom: 0.6rem; }
    body.theme-pro .bid-card-footer { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; font-size: 0.78rem; color: var(--pro-muted); }
    body.theme-pro .bid-amount { font-size: 0.9rem; font-weight: 500; color: var(--pro-teal); }
    body.theme-pro .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    body.theme-pro .filter-tab {
      padding: 0.4rem 1rem; border-radius: 999px; font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--pro-border-md); background: var(--pro-elevated);
      color: var(--pro-soft); cursor: pointer; transition: all 0.15s;
    }
    body.theme-pro .filter-tab:hover { color: var(--pro-text); }
    body.theme-pro .filter-tab.active { background: var(--pro-teal-glow); color: var(--pro-teal); border-color: rgba(0,151,167,0.2); }
  </style>
</head>
<body class="theme-pro">
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="../" class="sidebar-logo">Assemble<span>AtEase</span></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Workspace</div>
      <ul class="sidebar-nav">
        <li><a href="."><span class="nav-icon">⚡</span> Dashboard</a></li>
        <li><a href="browse-jobs"><span class="nav-icon">🔍</span> Browse Jobs</a></li>
        <li><a href="my-bids" class="active"><span class="nav-icon">💬</span> My Bids</a></li>
        <li><a href="my-jobs"><span class="nav-icon">🔧</span> My Jobs</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile"><span class="nav-icon">👤</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">🚪</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main" style="padding:2rem">
    <div class="page-header" style="margin-bottom:1.5rem">
      <div>
        <h1>My Bids</h1>
        <p>Track all the bids you've submitted.</p>
      </div>
      <a href="browse-jobs" class="btn btn-teal">🔍 Find more jobs</a>
    </div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-status="">All bids</button>
      <button class="filter-tab" data-status="pending">Pending</button>
      <button class="filter-tab" data-status="accepted">Accepted</button>
      <button class="filter-tab" data-status="rejected">Rejected</button>
      <button class="filter-tab" data-status="withdrawn">Withdrawn</button>
    </div>

    <div id="bids-list">
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
    </div>
  </main>
</div>

<script>
  let allBids = [];
  let activeStatus = '';

  function timeAgo(d) {
    if (!d) return '';
    const diff=Date.now()-new Date(d).getTime(), m=Math.floor(diff/60000), h=Math.floor(diff/3600000), days=Math.floor(diff/86400000);
    if (m<1) return 'Just now'; if (m<60) return m+'m ago'; if (h<24) return h+'h ago'; if (days===1) return 'Yesterday'; return days+'d ago';
  }

  function getBadgeClass(s) {
    return {pending:'badge-pending',accepted:'badge-accepted',rejected:'badge-rejected',withdrawn:'badge-default'}[s]||'badge-default';
  }

  function renderBids(bids) {
    const list = document.getElementById('bids-list');
    if (!bids?.length) {
      list.innerHTML = `<div class="empty-state"><p>No bids found.</p><a href="browse-jobs" class="btn btn-teal btn-sm">Browse jobs →</a></div>`;
      return;
    }
    list.innerHTML = bids.map(bid => `
      <a class="bid-card" href="bid-detail?id=${bid.id}">
        <div class="bid-card-top">
          <h3>${bid.job?.title || 'Untitled Job'}</h3>
          <div style="display:flex;align-items:center;gap:0.6rem;flex-shrink:0">
            <span class="bid-amount">$${bid.bid_amount}${bid.bid_type==='hourly'?'/hr':''}</span>
            <span class="badge ${getBadgeClass(bid.status)}">${bid.status}</span>
          </div>
        </div>
        <div class="bid-card-desc">${APP.truncate(bid.job?.description, 100)}</div>
        <div class="bid-card-footer">
          <span>📍 ${bid.job?.city||'Location TBD'}</span>
          <span>👤 ${bid.job?.customer?.full_name||'Customer'}</span>
          <span>⏱ ${timeAgo(bid.created_at)}</span>
          ${bid.status==='accepted' ? '<span style="color:var(--pro-teal)">✓ Accepted — view job details</span>' : ''}
        </div>
      </a>`).join('');
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const auth = await APP.requireVerifiedAssembler();
    if (!auth) return;
    const { user } = auth;

    document.getElementById('sidebar-logout')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href='../';
    });

    // Filter tabs
    document.getElementById('filter-tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeStatus = tab.dataset.status;
      const filtered = activeStatus ? allBids.filter(b => b.status === activeStatus) : allBids;
      renderBids(filtered);
    });

    try {
      const { data: bids, error } = await API.getMyBids(user.id);
      if (error) throw error;
      allBids = bids || [];
      renderBids(allBids);
    } catch (err) {
      document.getElementById('bids-list').innerHTML =
        `<div class="error-state"><span>⚠</span>Could not load bids. Please refresh.</div>`;
    }
  });
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/245917212.js"></script>
</body>
</html>
