<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Browse Jobs — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <script src="../assets/js/supabase.js" defer></script>
</head>
<body>
<nav class="nav" id="main-nav"></nav>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <ul class="sidebar-nav">
        <li><a href="index.html"><span class="nav-icon">🏠</span> Dashboard</a></li>
        <li><a href="browse-jobs.html" class="active"><span class="nav-icon">🔍</span> Browse Jobs</a></li>
        <li><a href="my-bids.html"><span class="nav-icon">💬</span> My Bids</a></li>
        <li><a href="my-jobs.html"><span class="nav-icon">🔧</span> My Jobs</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile.html"><span class="nav-icon">⭐</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">🚪</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main">
    <div class="page-header">
      <h1>Browse Jobs</h1>
      <p>Find and bid on jobs that match your skills.</p>
    </div>

    <!-- Filters -->
    <div class="card" style="padding:20px;margin-bottom:24px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="form-group" style="margin:0">
          <label style="font-size:0.8rem">Search</label>
          <input type="text" id="search-filter" class="form-control" placeholder="Search jobs..." />
        </div>
        <div class="form-group" style="margin:0">
          <label style="font-size:0.8rem">Category</label>
          <select id="category-filter" class="form-control">
            <option value="">All Categories</option>
            <option value="furniture">Furniture</option>
            <option value="gym-equipment">Gym Equipment</option>
            <option value="flat-pack">Flat-Pack</option>
            <option value="office">Office</option>
            <option value="outdoor">Outdoor</option>
            <option value="kids">Kids</option>
            <option value="appliances">Appliances</option>
            <option value="shelving">Shelving</option>
            <option value="beds">Beds</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label style="font-size:0.8rem">Budget</label>
          <select id="budget-filter" class="form-control">
            <option value="">Any Budget</option>
            <option value="0-100">$0 - $100</option>
            <option value="100-500">$100 - $500</option>
            <option value="500+">$500+</option>
          </select>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Reset Filters</button>
    </div>

    <!-- Jobs Grid -->
    <div id="jobs-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px">
      <div style="grid-column:1/-1;text-align:center;padding:64px;color:var(--text-secondary)">
        <div class="spinner spinner-lg" style="margin:0 auto 16px"></div>
        <p>Loading jobs...</p>
      </div>
    </div>

    <!-- Pagination -->
    <div style="text-align:center;margin-top:40px;padding:20px" id="pagination">
    </div>
  </main>
</div>

<script>
let allJobs = [];
let currentPage = 0;
const itemsPerPage = 12;

document.addEventListener('DOMContentLoaded', async () => {
  const auth = await APP.requireAuth(['assembler']);
  if (!auth) return;
  await APP.buildNav('assembler');
  APP.setActiveSidebarLink();

  document.getElementById('sidebar-logout')?.addEventListener('click', async (e) => {
    e.preventDefault();
    await supabaseClient.auth.signOut();
    window.location.href = '../index.html';
  });

  // Filter event listeners
  document.getElementById('search-filter').addEventListener('input', () => { currentPage = 0; renderJobs(); });
  document.getElementById('category-filter').addEventListener('change', () => { currentPage = 0; renderJobs(); });
  document.getElementById('budget-filter').addEventListener('change', () => { currentPage = 0; renderJobs(); });

  loadJobs();
});

async function loadJobs() {
  const { data, error } = await API.getOpenJobs({ limit: 100 });

  if (error) {
    document.getElementById('jobs-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center"><p>Error loading jobs: ' + error.message + '</p></div>';
    return;
  }

  allJobs = data || [];
  renderJobs();
}

function renderJobs() {
  // Apply filters
  let filtered = allJobs;

  const searchTerm = document.getElementById('search-filter').value.toLowerCase();
  if (searchTerm) {
    filtered = filtered.filter(j => 
      j.title.toLowerCase().includes(searchTerm) || 
      j.description.toLowerCase().includes(searchTerm)
    );
  }

  const category = document.getElementById('category-filter').value;
  if (category) {
    filtered = filtered.filter(j => j.category === category);
  }

  const budgetFilter = document.getElementById('budget-filter').value;
  if (budgetFilter) {
    const [min, max] = budgetFilter === '500+' 
      ? [500, Infinity] 
      : budgetFilter.split('-').map(Number);
    filtered = filtered.filter(j => j.budget_max >= min && j.budget_min <= max);
  }

  // Pagination
  const totalPages = Math.ceil(filtered.length / itemsPerPage);
  const start = currentPage * itemsPerPage;
  const end = start + itemsPerPage;
  const paged = filtered.slice(start, end);

  // Render cards
  const jobsGrid = document.getElementById('jobs-grid');
  
  if (!paged.length) {
    jobsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:64px"><p>No jobs found matching your filters.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  jobsGrid.innerHTML = paged.map(job => `
    <div class="card" style="padding:20px;cursor:pointer;transition:all 0.3s" onmouseover="this.style.boxShadow='0 8px 24px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow=''" onclick="window.location.href='job-detail.html?id=${job.id}'">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
        <h3 style="margin:0;flex:1">${job.title}</h3>
        <span style="background:var(--teal-light);padding:4px 8px;border-radius:4px;font-size:0.75rem;font-weight:700;color:white;white-space:nowrap;margin-left:8px">OPEN</span>
      </div>

      <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px">${job.category?.replace('-', ' ').toUpperCase()} • ${job.city}</div>

      <p style="line-height:1.5;color:var(--text-secondary);margin:12px 0;min-height:60px">${job.description?.substring(0, 100)}...</p>

      <div style="background:rgba(13,148,136,0.05);padding:12px;border-radius:6px;margin:12px 0">
        <div style="font-size:0.8rem;color:var(--text-secondary)">Budget</div>
        <div style="font-weight:700;color:var(--teal)">$${job.budget_min} - $${job.budget_max}</div>
      </div>

      <div style="display:flex;justify-content:space-between;font-size:0.85rem;color:var(--text-muted);padding-top:12px;border-top:1px solid var(--border);margin-top:12px">
        <div>${job.bids?.length || 0} bids</div>
        <div>Posted ${new Date(job.created_at).toLocaleDateString()}</div>
      </div>
    </div>
  `).join('');

  // Pagination controls
  let paginationHtml = '';
  if (totalPages > 1) {
    paginationHtml = '<div style="display:flex;gap:8px;justify-content:center">';
    
    if (currentPage > 0) {
      paginationHtml += `<button class="btn btn-ghost btn-sm" onclick="previousPage()">← Previous</button>`;
    }
    
    paginationHtml += `<div style="padding:8px 12px;color:var(--text-secondary)">Page ${currentPage + 1} of ${totalPages}</div>`;
    
    if (currentPage < totalPages - 1) {
      paginationHtml += `<button class="btn btn-ghost btn-sm" onclick="nextPage()">Next →</button>`;
    }
    
    paginationHtml += '</div>';
  }

  document.getElementById('pagination').innerHTML = paginationHtml;
}

function previousPage() {
  if (currentPage > 0) {
    currentPage--;
    renderJobs();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function nextPage() {
  const totalPages = Math.ceil(allJobs.length / itemsPerPage);
  if (currentPage < totalPages - 1) {
    currentPage++;
    renderJobs();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function resetFilters() {
  document.getElementById('search-filter').value = '';
  document.getElementById('category-filter').value = '';
  document.getElementById('budget-filter').value = '';
  currentPage = 0;
  renderJobs();
}
</script>
</body>
</html>
