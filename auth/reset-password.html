<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Set New Password — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; -webkit-font-smoothing: antialiased; }
    .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: #0d1117; text-decoration: none; display: block; text-align: center; margin-bottom: 2rem; }
    .logo span { color: #0097a7; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 1.75rem; color: #0d1117; margin-bottom: 0.4rem; text-align: center; }
    .sub { font-size: 0.9rem; color: #64748b; margin-bottom: 2rem; line-height: 1.6; text-align: center; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: #4a5568; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: #0d1117; background: #ffffff; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .form-control:focus { border-color: #0097a7; box-shadow: 0 0 0 3px rgba(0,151,167,0.1); }
    .form-control.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }
    .field-error { font-size: 0.78rem; color: #ef4444; margin-top: 4px; display: none; }
    .field-error.visible { display: block; }
    .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 0.85rem; border-radius: 999px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.18s; }
    .btn-primary { background: #0097a7; color: #fff; }
    .btn-primary:hover { background: #00838f; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 0.85rem 1rem; border-radius: 10px; font-size: 0.875rem; margin-bottom: 1.25rem; display: none; }
    .alert.show { display: block; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .alert-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #0097a7; text-decoration: none; transition: color 0.15s; }
    .back-link:hover { color: #00838f; text-decoration: underline; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <a href="../index" class="logo">Assemble<span>AtEase</span></a>
    <h1>Set new password</h1>
    <p class="sub">Choose a strong password for your account.</p>

    <div id="alert" class="alert"></div>

    <!-- Loading state while Supabase recovers session -->
    <div id="loading-state" style="text-align:center;padding:2rem 0;color:#64748b;font-size:0.9rem">
      Verifying reset link…
    </div>

    <!-- Password form — shown after session is recovered -->
    <div id="form-wrap" style="display:none">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" class="form-control" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" />
        <div class="field-error" id="password-error"></div>
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm new password</label>
        <input type="password" id="confirm-password" class="form-control" placeholder="Same password again" autocomplete="new-password" />
        <div class="field-error" id="confirm-password-error"></div>
      </div>
      <button class="btn btn-primary" id="save-btn" type="button">Set new password</button>
    </div>

    <a href="login" class="back-link">&#8592; Back to login</a>
  </div>

<script>
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert alert-' + type + ' show';
  }

  function fieldError(id, msg) {
    const el = document.getElementById(id + '-error');
    const input = document.getElementById(id);
    if (el) { el.textContent = msg; el.className = 'field-error visible'; }
    if (input) input.classList.add('error');
  }

  function clearErrors() {
    document.querySelectorAll('.field-error').forEach(el => { el.textContent = ''; el.className = 'field-error'; });
    document.querySelectorAll('.form-control').forEach(el => el.classList.remove('error'));
  }

  // Supabase fires PASSWORD_RECOVERY via the URL hash token.
  // We listen for onAuthStateChange to detect the recovery session.
  window.addEventListener('DOMContentLoaded', () => {
    if (!window.supabaseClient) {
      showAlert('Connection error. Please refresh the page.', 'error');
      document.getElementById('loading-state').style.display = 'none';
      return;
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Valid recovery session — show the form
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('form-wrap').style.display = 'block';
      } else if (event === 'SIGNED_IN' && !session) {
        // No session — invalid or expired link
        document.getElementById('loading-state').style.display = 'none';
        showAlert('This reset link has expired or is invalid. Please request a new one.', 'error');
      }
    });

    // Safety timeout — if no auth event fires within 5s, show an error
    setTimeout(() => {
      const loading = document.getElementById('loading-state');
      if (loading.style.display !== 'none') {
        loading.style.display = 'none';
        showAlert('Reset link is invalid or has expired. Please request a new one.', 'error');
      }
    }, 5000);
  });

  document.getElementById('save-btn').addEventListener('click', async () => {
    clearErrors();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm-password').value;

    let hasError = false;
    if (!password || password.length < 8) {
      fieldError('password', 'Password must be at least 8 characters.');
      hasError = true;
    }
    if (!confirm) {
      fieldError('confirm-password', 'Please confirm your password.');
      hasError = true;
    } else if (password !== confirm) {
      fieldError('confirm-password', 'Passwords do not match.');
      hasError = true;
    }
    if (hasError) return;

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Saving…';

    try {
      const { error } = await supabaseClient.auth.updateUser({ password });

      if (error) throw error;

      showAlert('Password updated! Redirecting to login…', 'success');
      document.getElementById('form-wrap').style.opacity = '0.5';
      document.getElementById('form-wrap').style.pointerEvents = 'none';

      setTimeout(() => {
        window.location.href = '/auth/login?reset=success';
      }, 1800);

    } catch (err) {
      showAlert(err.message || 'Failed to update password. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Set new password';
    }
  });

  // Allow Enter key on confirm field to submit
  document.getElementById('confirm-password')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('save-btn').click();
  });
</script>
</body>
</html>
