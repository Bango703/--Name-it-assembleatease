<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Assignments — AssembleAtEase</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js" integrity="sha384-rwykjmWNwVxboyFmvK9OXN0wj9hnMHA2aAHtits54DuACyCq0M2PrSNxhRb+hvXT" crossorigin="anonymous" defer></script>
  <script src="../config.js" defer></script>
  <script src="../assets/js/app.js" defer></script>
  <style>
    .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    body.theme-pro .filter-tab {
      padding: 0.4rem 1rem; border-radius: 999px;
      font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--pro-border-md);
      background: var(--pro-surface); color: var(--pro-soft);
      cursor: pointer; transition: all 0.15s;
    }
    body.theme-pro .filter-tab:hover { border-color: var(--pro-teal); color: var(--pro-teal); }
    body.theme-pro .filter-tab.active { background: rgba(0,151,167,0.08); color: var(--pro-teal); border-color: rgba(0,151,167,0.2); }

    body.theme-pro .asgn-card {
      background: var(--pro-surface); border: 1px solid var(--pro-border);
      border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem;
      transition: border-color 0.15s;
    }
    body.theme-pro .asgn-card:hover { border-color: var(--pro-border-md); }
    body.theme-pro .asgn-card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 0.5rem;
    }
    body.theme-pro .asgn-card h3 { font-size: 1rem; font-weight: 500; color: var(--pro-text); margin: 0; }
    body.theme-pro .asgn-card-meta { font-size: 0.82rem; color: var(--pro-muted); margin-top: 0.3rem; }
    body.theme-pro .asgn-card-footer {
      display: flex; align-items: center; gap: 1rem;
      font-size: 0.78rem; color: var(--pro-muted); flex-wrap: wrap;
      margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--pro-border);
    }
    body.theme-pro .asgn-status { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

    /* Detail modal */
    body.theme-pro .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center;
      padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    body.theme-pro .modal-overlay.open { opacity: 1; pointer-events: all; }
    body.theme-pro .modal-box {
      background: var(--pro-surface); border: 1px solid var(--pro-border-md);
      border-radius: 14px; padding: 1.5rem; max-width: 580px; width: 100%;
      max-height: 90vh; overflow-y: auto; position: relative;
    }
    body.theme-pro .modal-close {
      position: absolute; top: 1rem; right: 1rem; background: none; border: none;
      font-size: 1.3rem; color: var(--pro-muted); cursor: pointer; line-height: 1;
    }
    body.theme-pro .modal-close:hover { color: var(--pro-text); }
    /* Message thread */
    body.theme-pro .msg-thread {
      background: var(--pro-bg); border: 1px solid var(--pro-border); border-radius: 8px;
      padding: 1rem; max-height: 220px; overflow-y: auto; margin-bottom: 0.75rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    body.theme-pro .msg-bubble { max-width: 85%; }
    body.theme-pro .msg-bubble.mine { align-self: flex-end; }
    body.theme-pro .msg-bubble.theirs { align-self: flex-start; }
    body.theme-pro .msg-bubble-body {
      padding: 0.6rem 0.9rem; border-radius: 10px;
      font-size: 0.875rem; line-height: 1.5;
    }
    body.theme-pro .msg-bubble.mine .msg-bubble-body { background: #0097a7; color: #fff; }
    body.theme-pro .msg-bubble.theirs .msg-bubble-body { background: var(--pro-border); color: var(--pro-text); }
    body.theme-pro .msg-bubble-meta { font-size: 0.7rem; color: var(--pro-muted); margin-top: 0.2rem; text-align: right; }
    body.theme-pro .msg-bubble.theirs .msg-bubble-meta { text-align: left; }
    body.theme-pro .msg-input-row { display: flex; gap: 0.5rem; }
    body.theme-pro .msg-input-row textarea {
      flex: 1; resize: none; border-radius: 8px; padding: 0.6rem 0.75rem;
      font-size: 0.875rem; border: 1px solid var(--pro-border-md); background: var(--pro-bg);
      color: var(--pro-text); font-family: inherit;
    }
    body.theme-pro .msg-input-row textarea:focus { outline: none; border-color: var(--pro-teal); }
    body.theme-pro .checkin-banner {
      background: #d1fae5; border: 1px solid #6ee7b7; border-radius: 8px;
      padding: 0.75rem 1rem; font-size: 0.875rem; color: #065f46;
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body class="theme-pro">
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="../" class="sidebar-logo">Assemble<span>AtEase</span></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Workspace</div>
      <ul class="sidebar-nav">
        <li><a href="."><span class="nav-icon">&#9889;</span> Dashboard</a></li>
        <li><a href="my-assignments" class="active"><span class="nav-icon">&#128197;</span> My Assignments</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile"><span class="nav-icon">&#128100;</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:currentColor;vertical-align:middle"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg></span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main" style="padding:2rem">
    <div class="page-header" style="margin-bottom:1.5rem">
      <div>
        <h1 style="font-size:1.5rem;font-weight:600;margin:0 0 0.25rem">My Assignments</h1>
        <p style="font-size:0.875rem;color:var(--pro-muted);margin:0">Direct bookings assigned to you by the owner.</p>
      </div>
    </div>

    <div id="page-alert" class="alert hidden"></div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="confirmed">Active</button>
      <button class="filter-tab" data-filter="completed">Completed</button>
    </div>

    <div id="assignments-list">
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
    </div>
  </main>
</div>

<!-- Assignment Detail Modal -->
<div class="modal-overlay" id="asgn-modal">
  <div class="modal-box">
    <button class="modal-close" id="asgn-modal-close">&#10005;</button>
    <div id="asgn-modal-body"></div>
    <div id="checkin-section" style="display:none">
      <button class="btn btn-teal" id="checkin-btn" style="width:100%;margin-bottom:1rem">&#128205; Check In — I've Arrived</button>
    </div>
    <hr style="border:none;border-top:1px solid var(--pro-border);margin:1rem 0"/>
    <h4 style="font-size:0.875rem;font-weight:600;color:var(--pro-text);margin:0 0 0.75rem">Messages</h4>
    <div class="msg-thread" id="asgn-msg-thread"></div>
    <div class="msg-input-row">
      <textarea id="asgn-msg-input" rows="2" placeholder="Type a message…"></textarea>
      <button class="btn btn-teal" id="asgn-msg-send">Send</button>
    </div>
  </div>
</div>

<script>
  let allAssignments = [];
  let currentFilter = 'all';
  let sessionToken = null;
  let selectedBookingId = null;

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function formatDate(str) {
    if (!str) return '—';
    const d = new Date(str);
    if (isNaN(d)) return str;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function timeAgo(str) {
    if (!str) return '';
    const diff = Date.now() - new Date(str).getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return 'Yesterday';
    return days + 'd ago';
  }

  function renderAssignments(list) {
    const el = document.getElementById('assignments-list');
    if (!list || !list.length) {
      el.innerHTML = '<div class="pro-empty"><p>No assignments found for this filter.</p></div>';
      return;
    }
    el.innerHTML = list.map(function(b) {
      const customerFirst = (b.customer_name || 'Customer').split(' ')[0];
      const isCompleted = b.status === 'completed';
      const isActive = b.status === 'confirmed';
      const badgeClass = isCompleted ? 'badge-complete' : (b.assembler_accepted_at ? 'badge-accepted' : 'badge-pending');
      const badgeText = isCompleted ? 'Completed' : (b.assembler_accepted_at ? 'Accepted' : 'Pending Your Response');

      return '<div class="asgn-card" style="cursor:pointer" onclick="openDetail(\'' + b.id + '\')">' +
        '<div class="asgn-card-top">' +
          '<div>' +
            '<h3>' + esc(b.service || 'Service') + '</h3>' +
            '<div class="asgn-card-meta">' +
              esc(customerFirst) +
              (b.date ? ' &bull; ' + esc(b.date) : '') +
              (b.time ? ' at ' + esc(b.time) : '') +
            '</div>' +
          '</div>' +
          '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
        '</div>' +
        '<div class="asgn-card-footer">' +
          '<span>Ref: <code>' + esc(b.ref) + '</code></span>' +
          (b.address ? '<span>' + esc(b.address) + '</span>' : '') +
          (isCompleted && b.completed_at ? '<span>Done ' + timeAgo(b.completed_at) + '</span>' : '') +
          (!isCompleted && b.assigned_at ? '<span>Assigned ' + timeAgo(b.assigned_at) + '</span>' : '') +
          (b.checked_in_at ? '<span style="color:#059669">&#10003; Checked in ' + timeAgo(b.checked_in_at) + '</span>' : '') +
          (!isCompleted && b.assembler_accepted_at && !b.checked_in_at ? '<span style="color:var(--pro-teal)">Tap to check in &rarr;</span>' : '') +
        '</div>' +
      '</div>';
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', async function() {
    const auth = await APP.requireVerifiedAssembler();
    if (!auth) return;
    const session = auth.session;

    document.getElementById('sidebar-logout').addEventListener('click', async function(e) {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '../';
    });

    document.getElementById('filter-tabs').addEventListener('click', function(e) {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      const filtered = currentFilter === 'all'
        ? allAssignments
        : allAssignments.filter(b => b.status === currentFilter);
      renderAssignments(filtered);
    });

    try {
      const resp = await fetch('/api/booking/my-assignments', {
        headers: { 'Authorization': 'Bearer ' + session.access_token },
      });
      if (!resp.ok) throw new Error('Failed to load assignments');
      const data = await resp.json();
      allAssignments = data.bookings || [];
      renderAssignments(allAssignments);
    } catch (err) {
      document.getElementById('assignments-list').innerHTML =
        '<div class="pro-error">&#9888; Could not load assignments. Please refresh.</div>';
    }

    // Realtime: live updates when a booking is assigned or status changes
    const assignmentsChannel = supabaseClient
      .channel('assembler-assignments-' + auth.user.id)
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'bookings', filter: 'assembler_id=eq.' + auth.user.id },
        async (payload) => {
          // Refresh the full assignments list
          try {
            const r = await fetch('/api/booking/my-assignments', {
              headers: { 'Authorization': 'Bearer ' + session.access_token },
            });
            if (!r.ok) return;
            const d = await r.json();
            allAssignments = d.bookings || [];
            const activeTab = document.querySelector('.filter-tab.active');
            const cf = activeTab?.dataset.filter || 'all';
            const filtered = cf === 'all' ? allAssignments : allAssignments.filter(b => b.status === cf);
            renderAssignments(filtered);
            // Alert on new assignment
            if (payload.eventType === 'INSERT' || (payload.eventType === 'UPDATE' && payload.old?.assembler_id !== payload.new?.assembler_id)) {
              APP.showAlert('page-alert', '&#128276; You have been assigned a new booking!', 'success');
            }
          } catch {}
        }
      )
      .subscribe();
    window.addEventListener('beforeunload', () => assignmentsChannel.unsubscribe());

    // Modal close
    document.getElementById('asgn-modal-close').addEventListener('click', function() {
      document.getElementById('asgn-modal').classList.remove('open');
    });
    document.getElementById('asgn-modal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });

    // Check-in button
    document.getElementById('checkin-btn').addEventListener('click', async function() {
      if (!selectedBookingId) return;
      this.disabled = true;
      this.textContent = 'Checking in\u2026';
      try {
        const r = await fetch('/api/booking/checkin', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + session.access_token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ bookingId: selectedBookingId }),
        });
        const d = await r.json();
        if (d.ok) {
          document.getElementById('checkin-section').style.display = 'none';
          const banner = document.createElement('div');
          banner.className = 'checkin-banner';
          banner.innerHTML = '&#10003; You have checked in! The customer has been notified.';
          document.getElementById('asgn-modal-body').appendChild(banner);
          const b = allAssignments.find(x => x.id === selectedBookingId);
          if (b) b.checked_in_at = d.checkedInAt || new Date().toISOString();
          const activeTab = document.querySelector('.filter-tab.active');
          const cf = activeTab?.dataset.filter || 'all';
          const filtered = cf === 'all' ? allAssignments : allAssignments.filter(a => a.status === cf);
          renderAssignments(filtered);
        } else {
          alert(d.error || 'Check-in failed');
          this.disabled = false;
          this.textContent = '&#128205; Check In \u2014 I\'ve Arrived';
        }
      } catch {
        alert('Check-in failed. Please try again.');
        this.disabled = false;
        this.textContent = '&#128205; Check In \u2014 I\'ve Arrived';
      }
    });

    // Message send
    document.getElementById('asgn-msg-send').addEventListener('click', sendMsg);
    document.getElementById('asgn-msg-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    async function sendMsg() {
      const input = document.getElementById('asgn-msg-input');
      const body = input.value.trim();
      if (!body || !selectedBookingId) return;
      input.value = '';
      try {
        const r = await fetch('/api/booking/message', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + session.access_token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ bookingId: selectedBookingId, body, sender: 'assembler' }),
        });
        const d = await r.json();
        if (!d.success) { alert(d.error || 'Failed to send message'); input.value = body; }
      } catch { alert('Failed to send message'); input.value = body; }
    }
  });

  window.openDetail = function(bookingId) {
    const b = allAssignments.find(x => x.id === bookingId);
    if (!b) return;
    selectedBookingId = bookingId;
    const canCheckIn = b.status === 'confirmed' && b.assembler_accepted_at && !b.checked_in_at;

    document.getElementById('asgn-modal-body').innerHTML = [
      '<h3 style="margin:0 0 0.75rem;font-size:1.1rem">' + esc(b.service) + '</h3>',
      b.checked_in_at ? '<div class="checkin-banner">&#10003; Checked in at ' + new Date(b.checked_in_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) + '</div>' : '',
      '<div style="font-size:0.875rem;color:var(--pro-muted);display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1rem">',
        b.date ? '<span>&#128197; ' + esc(b.date) + (b.time ? ' at ' + esc(b.time) : '') + '</span>' : '',
        b.address ? '<span>&#128205; ' + esc(b.address) + '</span>' : '',
        b.details ? '<span>&#128221; ' + esc(b.details) + '</span>' : '',
        '<span style="color:var(--pro-muted);font-size:0.78rem">Ref: ' + esc(b.ref) + '</span>',
      '</div>',
    ].join('');

    document.getElementById('checkin-section').style.display = canCheckIn ? 'block' : 'none';
    const btn = document.getElementById('checkin-btn');
    btn.disabled = false;
    btn.innerHTML = '&#128205; Check In &mdash; I\'ve Arrived';
    document.getElementById('asgn-msg-thread').innerHTML = '<div style="color:var(--pro-muted);font-size:0.8rem;text-align:center;padding:1rem">Loading messages…</div>';
    document.getElementById('asgn-modal').classList.add('open');
    // Load messages from Supabase
    supabaseClient.from('messages').select('*').eq('booking_id', bookingId).order('created_at',{ascending:true})
      .then(function(r){
        var msgs=r.data||[];
        var thread=document.getElementById('asgn-msg-thread');
        if(!msgs.length){
          thread.innerHTML='<div style="color:var(--pro-muted);font-size:0.8rem;text-align:center;padding:1rem">No messages yet.</div>';
        } else {
          thread.innerHTML=msgs.map(function(m){
            var isMe=m.sender==='assembler';
            return '<div style="display:flex;justify-content:'+(isMe?'flex-end':'flex-start')+';margin-bottom:0.6rem">'
              +'<div style="max-width:80%;padding:0.55rem 0.85rem;border-radius:12px;font-size:0.875rem;line-height:1.5;'
              +(isMe?'background:var(--teal);color:#fff;border-radius:12px 12px 2px 12px':'background:var(--pro-surface);color:var(--pro-text);border:1px solid var(--pro-border);border-radius:12px 12px 12px 2px')+'">'+esc(m.body)+'</div></div>';
          }).join('');
          thread.scrollTop=thread.scrollHeight;
        }
      })
      .catch(function(){ document.getElementById('asgn-msg-thread').innerHTML='<div style="color:var(--pro-muted);font-size:0.8rem;text-align:center;padding:1rem">Could not load messages.</div>'; });
  };
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/245917212.js"></script>
</body>
</html>
