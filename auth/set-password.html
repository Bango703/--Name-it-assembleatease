<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Set Your Password — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      color: #0d1117;
      background: #f8fafc;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .auth-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo a {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: #0d1117;
      text-decoration: none;
    }

    .auth-logo span { color: #0097a7; }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 0.35rem;
      color: #0d1117;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 1.75rem;
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }
    .alert.hidden { display: none; }
    .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.875rem; font-weight: 500; color: #374151; }

    .input-with-icon { position: relative; }
    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #64748b;
      pointer-events: none;
    }

    .form-control {
      width: 100%;
      padding: 0.65rem 0.9rem 0.65rem 2.5rem;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: #0d1117;
      background: #ffffff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .form-control:focus {
      border-color: #0097a7;
      box-shadow: 0 0 0 3px rgba(0,151,167,0.1);
    }
    .form-control.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }
    .form-control::placeholder { color: #94a3b8; }

    .field-error {
      font-size: 0.78rem;
      color: #ef4444;
      margin-top: 2px;
      display: none;
    }
    .field-error.visible { display: block; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn-primary { background: #0097a7; color: #fff; border-color: #0097a7; }
    .btn-primary:hover:not(:disabled) { background: #00838f; border-color: #00838f; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-full { width: 100%; }
    .btn-lg { padding: 0.75rem 1.5rem; font-size: 0.95rem; }

    .loading-state {
      text-align: center;
      padding: 1rem 0;
      color: #64748b;
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: #0097a7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .auth-card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card" id="auth-card">

    <div class="auth-logo">
      <a href="../">Assemble<span>AtEase</span></a>
    </div>

    <!-- Loading state while Supabase processes the recovery token -->
    <div id="loading-state" class="loading-state">
      <div class="spinner"></div>
      <p>Verifying your link&hellip;</p>
    </div>

    <!-- Form (hidden until recovery session confirmed) -->
    <div id="form-section" style="display:none">
      <h1>Set Your Password</h1>
      <p class="subtitle">Choose a strong password to secure your account.</p>

      <div id="auth-alert" class="alert hidden"></div>

      <form class="auth-form" id="set-password-form" novalidate>
        <div class="form-group">
          <label for="password">New password</label>
          <div class="input-with-icon">
            <span class="input-icon">&#128274;</span>
            <input type="password" id="password" class="form-control"
              placeholder="At least 8 characters" autocomplete="new-password" required />
          </div>
          <span class="field-error" id="password-error"></span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <div class="input-with-icon">
            <span class="input-icon">&#128274;</span>
            <input type="password" id="confirm-password" class="form-control"
              placeholder="Repeat your password" autocomplete="new-password" required />
          </div>
          <span class="field-error" id="confirm-password-error"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
          Set Password &amp; Open Dashboard
        </button>
      </form>
    </div>

    <!-- Expired link state -->
    <div id="expired-section" style="display:none;text-align:center;padding:1rem 0">
      <div style="font-size:2rem;margin-bottom:1rem">&#128274;</div>
      <h2 style="font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:0.75rem">Link Expired</h2>
      <p style="color:#64748b;font-size:0.9rem;line-height:1.6;margin-bottom:1.5rem">
        This password link has expired or already been used.<br>
        Request a new one below.
      </p>
      <a href="forgot-password" class="btn btn-primary btn-full btn-lg" style="text-decoration:none">
        Get a New Link
      </a>
    </div>

  </div>
</div>

<script>
(function () {
  // Wait for Supabase client to be available (loaded by config.js)
  function waitForSupabase(cb) {
    if (window.supabaseClient) { cb(); return; }
    var t = setTimeout(function () { cb(); }, 3000); // fallback
    var i = setInterval(function () {
      if (window.supabaseClient) { clearInterval(i); clearTimeout(t); cb(); }
    }, 50);
  }

  waitForSupabase(function () {
    var client = window.supabaseClient;
    if (!client) {
      showExpired();
      return;
    }

    var sessionConfirmed = false;

    // Listen for Supabase to process the recovery token in the URL.
    // Supabase JS v2 fires INITIAL_SESSION, PASSWORD_RECOVERY, or SIGNED_IN
    // depending on version and how the hash was processed.
    client.auth.onAuthStateChange(function (event, session) {
      if (
        event === 'PASSWORD_RECOVERY' ||
        event === 'INITIAL_SESSION' ||
        (event === 'SIGNED_IN' && session)
      ) {
        if (session && !sessionConfirmed) {
          sessionConfirmed = true;
          showForm();
        }
      }
    });

    // Belt-and-suspenders: check for an existing session after a short delay
    // to catch cases where the URL hash was processed before the listener registered.
    setTimeout(function () {
      if (sessionConfirmed) return;
      client.auth.getSession().then(function (result) {
        var session = result.data && result.data.session;
        if (session && !sessionConfirmed) {
          sessionConfirmed = true;
          showForm();
        }
      });
    }, 200);

    // If no recovery event after 6 seconds, show expired screen
    setTimeout(function () {
      if (!sessionConfirmed) showExpired();
    }, 6000);

    function showForm() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('form-section').style.display = '';
    }

    function showExpired() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('expired-section').style.display = '';
    }

    function showAlert(type, message) {
      var el = document.getElementById('auth-alert');
      el.className = 'alert alert-' + type;
      el.textContent = message;
    }

    function fieldError(id, message) {
      var input = document.getElementById(id);
      var errEl = document.getElementById(id + '-error');
      if (input) input.classList.add('error');
      if (errEl) { errEl.textContent = message; errEl.classList.add('visible'); }
    }

    function clearErrors() {
      document.querySelectorAll('.form-control').forEach(function (el) { el.classList.remove('error'); });
      document.querySelectorAll('.field-error').forEach(function (el) { el.textContent = ''; el.classList.remove('visible'); });
      var alert = document.getElementById('auth-alert');
      alert.className = 'alert hidden';
      alert.textContent = '';
    }

    document.getElementById('set-password-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearErrors();

      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirm-password').value;
      var hasError = false;

      if (!password || password.length < 8) {
        fieldError('password', 'Password must be at least 8 characters.');
        hasError = true;
      }
      if (password !== confirm) {
        fieldError('confirm-password', 'Passwords do not match.');
        hasError = true;
      }
      if (hasError) return;

      var btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Setting password\u2026';

      try {
        var result = await client.auth.updateUser({ password: password });

        if (result.error) {
          var msg = result.error.message || 'Failed to set password. Please try again.';
          // Recovery session expired between page load and form submit
          if (msg.toLowerCase().includes('session') || msg.toLowerCase().includes('auth')) {
            msg = 'Your session has expired. Please use the link in your email again, or request a new one below.';
            showAlert('error', msg);
            btn.disabled = false;
            btn.textContent = 'Set Password \u0026 Open Dashboard';
            setTimeout(function () {
              document.getElementById('form-section').style.display = 'none';
              document.getElementById('expired-section').style.display = '';
            }, 3500);
            return;
          }
          showAlert('error', msg);
          btn.disabled = false;
          btn.textContent = 'Set Password \u0026 Open Dashboard';
          return;
        }

        // Determine redirect based on role
        try {
          var userResult = await client.auth.getUser();
          var userId = userResult.data && userResult.data.user && userResult.data.user.id;
          if (userId) {
            var profileResult = await client.from('profiles').select('role').eq('id', userId).single();
            var role = profileResult.data && profileResult.data.role;
            window.location.href = role === 'assembler' ? '../assembler/' : '../customer/';
            return;
          }
        } catch (e) { /* fall through to default */ }

        window.location.href = '../assembler/';

      } catch (err) {
        showAlert('error', 'Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Set Password & Open Dashboard';
      }
    });
  });
})();
</script>
</body>
</html>
