<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Earnings — AssembleAtEase</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AE Easer" />
  <meta name="theme-color" content="#0097a7" />
  <link rel="apple-touch-icon" href="/images/logo.jpg" />
  <style>body{visibility:hidden}</style>
  <link rel="stylesheet" href="../assets/css/easer.css" />
  <link rel="stylesheet" href="../assets/status.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js" integrity="sha384-rwykjmWNwVxboyFmvK9OXN0wj9hnMHA2aAHtits54DuACyCq0M2PrSNxhRb+hvXT" crossorigin="anonymous" defer></script>
  <script src="../config.js" defer></script>
  <script src="../assets/js/app.js" defer></script>
  <style>
    :root{--pro-bg:#f8fafc;--pro-surface:#ffffff;--pro-elevated:#f1f5f9;--pro-border:#e2e8f0;--pro-border-md:#cbd5e1;--pro-text:#0d1117;--pro-muted:#64748b;--pro-soft:#374151;--pro-teal:#0097a7;--pro-teal-dim:rgba(0,151,167,0.08);--teal:#0097a7}
    .logout-link{font-size:0.72rem;color:var(--e-muted);text-decoration:none;font-weight:500;white-space:nowrap;padding:0.4rem 0}
    .logout-link:hover{color:var(--e-text)}

    body.theme-pro .summary-bar {
      background: var(--pro-surface); border: 1px solid var(--pro-border);
      border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
    }
    body.theme-pro .summary-stat { text-align: center; }
    body.theme-pro .summary-stat-value { font-size: 1.5rem; font-weight: 700; color: var(--pro-text); }
    body.theme-pro .summary-stat-label { font-size: 0.75rem; color: var(--pro-muted); margin-top: 2px; }

    body.theme-pro .payout-card {
      background: var(--pro-surface); border: 1px solid var(--pro-border);
      border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem;
    }
    body.theme-pro .payout-card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 0.5rem;
    }
    body.theme-pro .payout-card h3 { font-size: 0.95rem; font-weight: 500; color: var(--pro-text); margin: 0; }
    body.theme-pro .payout-card-meta { font-size: 0.82rem; color: var(--pro-muted); margin-top: 0.25rem; }
    body.theme-pro .payout-amounts {
      display: flex; gap: 1.5rem; margin-top: 0.75rem; padding-top: 0.75rem;
      border-top: 1px solid var(--pro-border); font-size: 0.82rem; flex-wrap: wrap;
    }
    body.theme-pro .payout-amount-item { display: flex; flex-direction: column; gap: 2px; }
    body.theme-pro .payout-amount-label { color: var(--pro-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
    body.theme-pro .payout-amount-value { font-weight: 600; color: var(--pro-text); }
    body.theme-pro .payout-amount-value.green { color: #059669; }
    body.theme-pro .payout-amount-value.red { color: #dc2626; }
  </style>
</head>
<body class="theme-pro">

<div class="e-offline" id="e-offline">No connection — updates paused</div>

<header class="easer-header">
  <a href="/assembler/" class="easer-header-brand">Assemble<span>AtEase</span></a>
  <div class="easer-header-title">Earnings</div>
  <div class="easer-header-right">
    <a href="#" id="sidebar-logout" class="logout-link">Sign out</a>
  </div>
</header>

<div class="easer-page">
  <div id="page-alert" class="alert hidden"></div>

  <div class="e-period-tabs" id="period-tabs">
    <button class="e-period-tab active" data-period="all">All Time</button>
    <button class="e-period-tab" data-period="month">This Month</button>
    <button class="e-period-tab" data-period="week">This Week</button>
  </div>

  <div class="summary-bar" id="summary-bar">
    <div class="summary-stat"><div class="e-skeleton" style="height:40px"></div></div>
    <div class="summary-stat"><div class="e-skeleton" style="height:40px"></div></div>
    <div class="summary-stat"><div class="e-skeleton" style="height:40px"></div></div>
  </div>

  <div id="payouts-list">
    <div class="e-skeleton-card"><div class="e-skeleton" style="height:80px"></div></div>
    <div class="e-skeleton-card"><div class="e-skeleton" style="height:80px"></div></div>
  </div>
</div>

<nav class="easer-nav">
  <a href="/assembler/" class="easer-nav-item">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Home</span>
  </a>
  <a href="/assembler/my-assignments" class="easer-nav-item">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Jobs</span>
  </a>
  <a href="/assembler/payouts" class="easer-nav-item active">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    <span>Earnings</span>
  </a>
  <a href="/assembler/profile" class="easer-nav-item">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
</nav>

<script>
  var allCompleted = [];

  function fmt(cents) {
    if (!cents && cents !== 0) return '—';
    return '$' + (cents / 100).toFixed(2);
  }
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function filterByPeriod(list, period) {
    if (period === 'all') return list;
    var now = new Date();
    if (period === 'week') {
      var cutoff = new Date(now - 7 * 86400000);
      return list.filter(function(b){ return b.completed_at && new Date(b.completed_at) >= cutoff; });
    }
    if (period === 'month') {
      var cutoff = new Date(now.getFullYear(), now.getMonth(), 1);
      return list.filter(function(b){ return b.completed_at && new Date(b.completed_at) >= cutoff; });
    }
    return list;
  }

  function renderEarnings(list) {
    var totalEarned = list.reduce(function(s, b){ return s + (b.assembler_due || 0); }, 0);
    var totalFees   = list.reduce(function(s, b){ return s + (b.platform_fee || 0); }, 0);

    document.getElementById('summary-bar').innerHTML =
      '<div class="summary-stat"><div class="summary-stat-value" style="color:#059669">' + fmt(totalEarned) + '</div><div class="summary-stat-label">Total Earned</div></div>' +
      '<div class="summary-stat"><div class="summary-stat-value">' + list.length + '</div><div class="summary-stat-label">Jobs</div></div>' +
      '<div class="summary-stat"><div class="summary-stat-value" style="color:#dc2626">' + fmt(totalFees) + '</div><div class="summary-stat-label">Fees</div></div>';

    var el = document.getElementById('payouts-list');
    if (!list.length) {
      el.innerHTML = '<div class="e-empty"><div class="e-empty-title">No earnings in this period</div><div class="e-empty-desc">Completed jobs will appear here.</div></div>';
      return;
    }

    el.innerHTML = list.slice().reverse().map(function(b) {
      var feePct = b.platform_fee_pct ? b.platform_fee_pct + '%' : '—';
      return '<div class="payout-card">' +
        '<div class="payout-card-top">' +
          '<div>' +
            '<h3>' + esc(b.service || 'Service') + '</h3>' +
            '<div class="payout-card-meta">' + esc(b.ref) + ' &bull; ' + fmtDate(b.completed_at) + '</div>' +
          '</div>' +
          '<div class="payout-amount-value green" style="font-size:1rem">' + fmt(b.assembler_due) + '</div>' +
        '</div>' +
        '<div class="payout-amounts">' +
          '<div class="payout-amount-item"><div class="payout-amount-label">Job Total</div><div class="payout-amount-value">' + fmt(b.amount_charged) + '</div></div>' +
          '<div class="payout-amount-item"><div class="payout-amount-label">Platform Fee (' + feePct + ')</div><div class="payout-amount-value red">&minus;' + fmt(b.platform_fee) + '</div></div>' +
          '<div class="payout-amount-item"><div class="payout-amount-label">Your Payout</div><div class="payout-amount-value green">' + fmt(b.assembler_due) + '</div></div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', async function() {
    const auth = await APP.requireAuth(["assembler"]);
    if (!auth) return;
    document.body.style.visibility = 'visible';
    const session = auth.session;

    var offlineBanner = document.getElementById('e-offline');
    window.addEventListener('offline', function() { if (offlineBanner) offlineBanner.classList.add('show'); });
    window.addEventListener('online',  function() { if (offlineBanner) offlineBanner.classList.remove('show'); });

    document.getElementById('sidebar-logout').addEventListener('click', async function(e) {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '/';
    });

    // Period tab switching
    document.getElementById('period-tabs').addEventListener('click', function(e) {
      var tab = e.target.closest('.e-period-tab');
      if (!tab) return;
      document.querySelectorAll('.e-period-tab').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      renderEarnings(filterByPeriod(allCompleted, tab.dataset.period));
    });

    try {
      const { data: { session: fresh } } = await supabaseClient.auth.getSession();
      const token = (fresh || session).access_token;
      const resp = await fetch('/api/booking/my-assignments', {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      if (!resp.ok) throw new Error('Failed to load');
      const data = await resp.json();
      allCompleted = (data.bookings || []).filter(function(b){ return b.status === 'completed'; });
      renderEarnings(allCompleted);
    } catch (err) {
      document.getElementById('payouts-list').innerHTML =
        '<div class="e-alert error show">Could not load earnings history. Please refresh.</div>';
    }
  });
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/245917212.js"></script>
</body>
</html>
