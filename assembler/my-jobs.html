<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Jobs — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <style>
    body.theme-pro .job-card {
      background: var(--pro-surface); border: 1px solid var(--pro-border);
      border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem;
      cursor: pointer; transition: all 0.15s; display: block; text-decoration: none;
    }
    body.theme-pro .job-card:hover { border-color: var(--pro-border-md); background: var(--pro-elevated); }
    body.theme-pro .job-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.4rem; }
    body.theme-pro .job-card h3 { font-size: 0.95rem; font-weight: 500; color: var(--pro-text); }
    body.theme-pro .job-card-desc { font-size: 0.85rem; color: var(--pro-muted); line-height: 1.55; margin-bottom: 0.6rem; }
    body.theme-pro .job-card-footer { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; font-size: 0.78rem; color: var(--pro-muted); }
    body.theme-pro .earned-tag { font-size: 0.9rem; font-weight: 500; color: var(--pro-teal); }
    body.theme-pro .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    body.theme-pro .filter-tab {
      padding: 0.4rem 1rem; border-radius: 999px; font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--pro-border-md); background: var(--pro-elevated);
      color: var(--pro-soft); cursor: pointer; transition: all 0.15s;
    }
    body.theme-pro .filter-tab.active { background: var(--pro-teal-glow); color: var(--pro-teal); border-color: rgba(29,158,117,0.3); }
  </style>
</head>
<body class="theme-pro">
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="../index.html" class="sidebar-logo">Assemble<span>AtEase</span></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Workspace</div>
      <ul class="sidebar-nav">
        <li><a href="index.html"><span class="nav-icon">⚡</span> Dashboard</a></li>
        <li><a href="browse-jobs.html"><span class="nav-icon">🔍</span> Browse Jobs</a></li>
        <li><a href="my-bids.html"><span class="nav-icon">💬</span> My Bids</a></li>
        <li><a href="my-jobs.html" class="active"><span class="nav-icon">🔧</span> My Jobs</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile.html"><span class="nav-icon">👤</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">🚪</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main" style="padding:2rem">
    <div class="page-header" style="margin-bottom:1.5rem">
      <div>
        <h1>My Jobs</h1>
        <p>Jobs where your bid was accepted.</p>
      </div>
    </div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-status="">All</button>
      <button class="filter-tab" data-status="assigned">Assigned</button>
      <button class="filter-tab" data-status="in_progress">In Progress</button>
      <button class="filter-tab" data-status="completed">Completed</button>
    </div>

    <div id="jobs-list">
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
    </div>
  </main>
</div>

<script>
  let allJobs = [];

  function timeAgo(d) {
    if (!d) return '';
    const diff=Date.now()-new Date(d).getTime(), m=Math.floor(diff/60000), h=Math.floor(diff/3600000), days=Math.floor(diff/86400000);
    if (m<1) return 'Just now'; if (m<60) return m+'m ago'; if (h<24) return h+'h ago'; if (days===1) return 'Yesterday'; return days+'d ago';
  }

  function getBadgeClass(s) {
    return {assigned:'badge-accepted',in_progress:'badge-accepted',completed:'badge-complete',cancelled:'badge-rejected'}[s]||'badge-default';
  }

  function renderJobs(jobs) {
    const list = document.getElementById('jobs-list');
    if (!jobs?.length) {
      list.innerHTML = `<div class="empty-state"><p>No jobs here yet. Win some bids first!</p><a href="browse-jobs.html" class="btn btn-teal btn-sm">Browse jobs →</a></div>`;
      return;
    }
    list.innerHTML = jobs.map(job => `
      <a class="job-card" href="job-detail.html?id=${job.id}">
        <div class="job-card-top">
          <h3>${job.title}</h3>
          <div style="display:flex;align-items:center;gap:0.6rem;flex-shrink:0">
            ${job.agreed_amount ? `<span class="earned-tag">$${job.agreed_amount}</span>` : ''}
            <span class="badge ${getBadgeClass(job.status)}">${job.status.replace('_',' ')}</span>
          </div>
        </div>
        <div class="job-card-desc">${APP.truncate(job.description, 100)}</div>
        <div class="job-card-footer">
          <span>📍 ${job.city||'Location TBD'}${job.state?', '+job.state:''}</span>
          <span>👤 ${job.customer?.full_name||'Customer'}</span>
          <span>⏱ ${timeAgo(job.created_at)}</span>
        </div>
      </a>`).join('');
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const auth = await APP.requireAuth(['assembler']);
    if (!auth) return;
    const { user } = auth;

    document.getElementById('sidebar-logout')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '../index.html';
    });

    document.getElementById('filter-tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const status = tab.dataset.status;
      renderJobs(status ? allJobs.filter(j => j.status === status) : allJobs);
    });

    try {
      const { data: jobs, error } = await API.getJobs({ assemblerId: user.id });
      if (error) throw error;
      allJobs = jobs || [];
      renderJobs(allJobs);
    } catch (err) {
      document.getElementById('jobs-list').innerHTML =
        `<div class="error-state"><span>⚠</span>Could not load jobs. Please refresh.</div>`;
    }
  });
</script>
</body>
</html>
