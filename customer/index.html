<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Customer Dashboard — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <script src="../assets/js/supabase.js" defer></script>
</head>
<body>
<nav class="nav" id="main-nav"></nav>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <ul class="sidebar-nav">
        <li><a href="index.html" class="active"><span class="nav-icon">🏠</span> Dashboard</a></li>
        <li><a href="browse-assemblers.html"><span class="nav-icon">👥</span> Browse Assemblers</a></li>
        <li><a href="post-job.html"><span class="nav-icon">📝</span> Post a Job</a></li>
        <li><a href="my-jobs.html"><span class="nav-icon">📋</span> My Jobs</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile.html"><span class="nav-icon">⚙️</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">🚪</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main">
    <div class="page-header flex-between">
      <div>
        <h1 id="welcome-msg">Welcome back 👋</h1>
        <p>Manage your jobs and find the perfect assembler for your needs.</p>
      </div>
      <a href="post-job.html" class="btn btn-primary">📝 &nbsp; Post a Job</a>
    </div>

    <!-- STATS -->
    <div class="grid-4 mb-32" id="stats-grid">
      <div class="stat-card"><div class="skeleton" style="height:80px;border-radius:8px"></div></div>
      <div class="stat-card"><div class="skeleton" style="height:80px;border-radius:8px"></div></div>
      <div class="stat-card"><div class="skeleton" style="height:80px;border-radius:8px"></div></div>
      <div class="stat-card"><div class="skeleton" style="height:80px;border-radius:8px"></div></div>
    </div>

    <div class="grid-2">
      <!-- Recent jobs -->
      <div>
        <div class="flex-between mb-16">
          <h3>Your Recent Jobs</h3>
          <a href="my-jobs.html" class="btn btn-ghost btn-sm">View all →</a>
        </div>
        <div id="jobs-list">
          <div class="loading-overlay"><div class="spinner spinner-lg"></div></div>
        </div>
      </div>

      <!-- Recommendations -->
      <div>
        <div class="flex-between mb-16">
          <h3>Recommended Assemblers</h3>
          <a href="browse-assemblers.html" class="btn btn-ghost btn-sm">Browse all →</a>
        </div>
        <div id="assemblers-list">
          <div class="loading-overlay"><div class="spinner spinner-lg"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const auth = await APP.requireAuth(['customer']);
  if (!auth) return;
  const { user, profile } = auth;
  await APP.buildNav('customer');
  APP.setActiveSidebarLink();

  document.getElementById('welcome-msg').textContent =
    `Welcome back, ${profile.full_name?.split(' ')[0] || 'there'} 👋`;

  // Logout handler
  document.getElementById('sidebar-logout')?.addEventListener('click', async (e) => {
    e.preventDefault();
    await supabaseClient.auth.signOut();
    window.location.href = '../index.html';
  });

  // Load stats
  const stats = await API.getCustomerStats(user.id);
  const statsGrid = document.getElementById('stats-grid');
  statsGrid.innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${stats.totalJobs}</div>
      <div class="stat-label">Total Jobs</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${stats.openJobs}</div>
      <div class="stat-label">Open Jobs</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${stats.inProgress}</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${stats.completed}</div>
      <div class="stat-label">Completed</div>
    </div>
  `;

  // Load recent jobs
  const { data: jobs } = await API.getJobs({ customerId: user.id, limit: 5 });
  const jobsList = document.getElementById('jobs-list');
  if (jobs?.length) {
    jobsList.innerHTML = jobs.map(job => `
      <div class="card" style="padding:16px;margin-bottom:12px;cursor:pointer" onclick="window.location.href='job-detail.html?id=${job.id}'">
        <div class="flex-between mb-8">
          <h4>${job.title}</h4>
          <span class="badge" style="background:${job.status === 'open' ? 'var(--teal-light)' : job.status === 'assigned' ? 'var(--orange)' : 'var(--text-muted)'}">${job.status}</span>
        </div>
        <p style="font-size:0.9rem;color:var(--text-secondary)">${job.description?.substring(0, 80)}...</p>
        <div style="font-size:0.85rem;color:var(--text-muted);margin-top:8px">${job.bids?.length || 0} bids</div>
      </div>
    `).join('');
  } else {
    jobsList.innerHTML = '<div class="card text-center" style="padding:32px"><p>No jobs yet. <a href="post-job.html">Post one now!</a></p></div>';
  }

  // Load recommended assemblers
  const { data: assemblers } = await API.getAssemblers({ limit: 5 });
  const assemblersList = document.getElementById('assemblers-list');
  if (assemblers?.length) {
    assemblersList.innerHTML = assemblers.map(a => `
      <div class="card" style="padding:16px;margin-bottom:12px;cursor:pointer" onclick="window.location.href='assembler-detail.html?id=${a.id}'">
        <div class="flex-between mb-8">
          <div>
            <h4>${a.full_name || 'Unnamed'}</h4>
            <div style="font-size:0.85rem;color:var(--text-secondary)">${a.city || 'Location TBD'}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:600">⭐ ${a.rating || 'N/A'}</div>
            <div style="font-size:0.85rem;color:var(--text-muted)">${a.completed_jobs || 0} jobs</div>
          </div>
        </div>
        <p style="font-size:0.85rem;color:var(--text-secondary)">${a.bio?.substring(0, 60) || 'Professional assembler'}...</p>
      </div>
    `).join('');
  } else {
    assemblersList.innerHTML = '<div class="card text-center" style="padding:32px"><p><a href="browse-assemblers.html">Browse assemblers →</a></p></div>';
  }
});
</script>
</body>
</html>
