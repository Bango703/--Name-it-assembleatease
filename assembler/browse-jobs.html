<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Browse Jobs — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <style>
    body.theme-pro .filters-bar {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      margin-bottom: 1.5rem; align-items: center;
    }
    body.theme-pro .filter-select {
      padding: 0.5rem 0.9rem; border-radius: 8px;
      background: var(--pro-elevated); border: 1px solid var(--pro-border-md);
      color: var(--pro-soft); font-family: var(--font-body); font-size: 0.85rem;
      cursor: pointer; outline: none; transition: border-color 0.15s;
    }
    body.theme-pro .filter-select:focus { border-color: var(--pro-teal); }
    body.theme-pro .search-input {
      flex: 1; min-width: 200px; padding: 0.5rem 0.9rem; border-radius: 8px;
      background: var(--pro-elevated); border: 1px solid var(--pro-border-md);
      color: var(--pro-text); font-family: var(--font-body); font-size: 0.875rem;
      outline: none; transition: border-color 0.15s;
    }
    body.theme-pro .search-input::placeholder { color: var(--pro-muted); }
    body.theme-pro .search-input:focus { border-color: var(--pro-teal); }
    body.theme-pro .job-card {
      background: var(--pro-surface); border: 1px solid var(--pro-border);
      border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem;
      cursor: pointer; transition: all 0.15s; text-decoration: none; display: block;
    }
    body.theme-pro .job-card:hover { border-color: var(--pro-border-md); background: var(--pro-elevated); }
    body.theme-pro .job-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.5rem; }
    body.theme-pro .job-card h3 { font-size: 1rem; font-weight: 500; color: var(--pro-text); }
    body.theme-pro .job-card-desc { font-size: 0.875rem; color: var(--pro-muted); line-height: 1.6; margin-bottom: 0.75rem; }
    body.theme-pro .job-card-footer { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    body.theme-pro .job-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--pro-muted); }
    body.theme-pro .budget-tag { font-size: 0.82rem; font-weight: 500; color: var(--pro-teal); }
    body.theme-pro .results-count { font-size: 0.82rem; color: var(--pro-muted); margin-bottom: 1rem; }
    body.theme-pro .load-more-wrap { text-align: center; margin-top: 1.5rem; }
  </style>
</head>
<body class="theme-pro">
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="../index.html" class="sidebar-logo">Assemble<span>AtEase</span></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Workspace</div>
      <ul class="sidebar-nav">
        <li><a href="index.html"><span class="nav-icon">⚡</span> Dashboard</a></li>
        <li><a href="browse-jobs.html" class="active"><span class="nav-icon">🔍</span> Browse Jobs</a></li>
        <li><a href="my-bids.html"><span class="nav-icon">💬</span> My Bids</a></li>
        <li><a href="my-jobs.html"><span class="nav-icon">🔧</span> My Jobs</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile.html"><span class="nav-icon">👤</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">🚪</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main" style="padding:2rem">
    <div class="page-header" style="margin-bottom:1.5rem">
      <div>
        <h1>Browse Jobs</h1>
        <p>Find assembly jobs near you and submit your best bid.</p>
      </div>
    </div>

    <div id="page-alert" class="alert hidden"></div>

    <!-- Filters -->
    <div class="filters-bar">
      <input type="text" class="search-input" id="search-input" placeholder="🔍  Search jobs…" />
      <select class="filter-select" id="category-filter">
        <option value="">All categories</option>
        <option>Furniture Assembly</option>
        <option>Flat-Pack / IKEA</option>
        <option>TV Mounting & AV Setup</option>
        <option>Gym & Fitness Equipment</option>
        <option>Office Furniture</option>
        <option>Smart Home & Tech Install</option>
        <option>Shelving & Storage</option>
        <option>Beds & Bedroom</option>
        <option>Outdoor & Garden Furniture</option>
        <option>Picture & Mirror Hanging</option>
        <option>Kids Furniture & Toys</option>
        <option>Appliances</option>
        <option>Other / Custom</option>
      </select>
      <button class="btn btn-teal btn-sm" id="search-btn">Search</button>
    </div>

    <div id="results-count" class="results-count"></div>
    <div id="jobs-list">
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
    </div>
    <div class="load-more-wrap">
      <button class="btn btn-ghost btn-sm" id="load-more-btn" style="display:none">Load more</button>
    </div>
  </main>
</div>

<script>
  let offset = 0;
  const LIMIT = 12;
  let currentSearch = '';
  let currentCategory = '';

  function timeAgo(d) {
    if (!d) return '';
    const diff=Date.now()-new Date(d).getTime(), m=Math.floor(diff/60000), h=Math.floor(diff/3600000), days=Math.floor(diff/86400000);
    if (m<1) return 'Just now'; if (m<60) return m+'m ago'; if (h<24) return h+'h ago'; if (days===1) return 'Yesterday'; return days+'d ago';
  }

  function formatBudget(job) {
    if (!job.budget_min && !job.budget_max) return 'Budget TBD';
    if (job.budget_min && job.budget_max) return `$${job.budget_min}–$${job.budget_max}`;
    if (job.budget_max) return `Up to $${job.budget_max}`;
    return `From $${job.budget_min}`;
  }

  function renderJobs(jobs, append = false) {
    const list = document.getElementById('jobs-list');
    const html = jobs.map(job => {
      const bidCount = job.bids?.[0]?.count ?? 0;
      return `
        <a class="job-card" href="job-detail.html?id=${job.id}">
          <div class="job-card-top">
            <h3>${job.title}</h3>
            <span class="badge badge-new" style="flex-shrink:0">Open</span>
          </div>
          <div class="job-card-desc">${APP.truncate(job.description, 120)}</div>
          <div class="job-card-footer">
            <span class="budget-tag">${formatBudget(job)}</span>
            <span class="job-tag">📍 ${job.city || 'Location TBD'}${job.state ? ', '+job.state : ''}</span>
            <span class="job-tag">🗂️ ${job.category || 'General'}</span>
            <span class="job-tag">💬 ${bidCount} bid${bidCount!==1?'s':''}</span>
            <span class="job-tag">⏱ ${timeAgo(job.created_at)}</span>
          </div>
        </a>`;
    }).join('');
    if (append) list.innerHTML += html;
    else list.innerHTML = html || `<div class="empty-state"><p>No jobs found matching your search.</p></div>`;
  }

  async function loadJobs(append = false) {
    if (!append) {
      offset = 0;
      document.getElementById('jobs-list').innerHTML =
        '<div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>'.repeat(4);
    }
    try {
      const { data: jobs, count } = await API.getOpenJobs({
        search: currentSearch || undefined,
        category: currentCategory || undefined,
        limit: LIMIT, offset
      });
      if (!append) {
        document.getElementById('results-count').textContent =
          count != null ? `${count} job${count !== 1 ? 's' : ''} found` : '';
      }
      renderJobs(jobs || [], append);
      offset += LIMIT;
      const loadMore = document.getElementById('load-more-btn');
      loadMore.style.display = (jobs?.length === LIMIT) ? 'inline-flex' : 'none';
    } catch (err) {
      document.getElementById('jobs-list').innerHTML =
        `<div class="error-state"><span>⚠</span>Could not load jobs. Please refresh.</div>`;
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const auth = await APP.requireAuth(['assembler']);
    if (!auth) return;

    document.getElementById('sidebar-logout')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '../index.html';
    });

    // Pre-fill search from URL params
    const params = new URLSearchParams(window.location.search);
    if (params.get('q')) { document.getElementById('search-input').value = params.get('q'); currentSearch = params.get('q'); }

    await loadJobs();

    document.getElementById('search-btn').addEventListener('click', () => {
      currentSearch   = document.getElementById('search-input').value.trim();
      currentCategory = document.getElementById('category-filter').value;
      loadJobs();
    });

    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });

    document.getElementById('category-filter').addEventListener('change', () => {
      currentCategory = document.getElementById('category-filter').value;
      loadJobs();
    });

    document.getElementById('load-more-btn').addEventListener('click', () => loadJobs(true));
  });
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/245917212.js"></script>
</body>
</html>
