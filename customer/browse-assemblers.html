<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Browse Assemblers — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <style>
    .filters-bar {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: grid; grid-template-columns: 1fr 1fr 1fr auto;
      gap: 0.75rem; align-items: flex-end;
    }
    .assemblers-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem;
    }
    .assembler-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem;
      text-align: center; transition: border-color 0.15s, box-shadow 0.15s;
      cursor: pointer; text-decoration: none; display: block;
    }
    .assembler-card:hover { border-color: #c8c4bb; box-shadow: var(--shadow-sm); }
    .assembler-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--accent-light); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 500; margin: 0 auto 0.85rem;
      font-family: var(--font-display); overflow: hidden; flex-shrink: 0;
    }
    .assembler-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .assembler-name { font-size: 0.95rem; font-weight: 500; color: var(--ink); margin-bottom: 0.25rem; }
    .assembler-rating { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.75rem; }
    .assembler-rating span { color: #f59e0b; font-weight: 500; }
    .assembler-tags { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 0.85rem; }
    .assembler-tag { font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 999px; border: 1px solid var(--border); background: var(--off-white); color: var(--ink-soft); }
    .assembler-bio { font-size: 0.82rem; color: var(--muted); line-height: 1.55; margin-bottom: 1rem; }
    .results-meta { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }
    .pagination { display: flex; align-items: center; gap: 0.75rem; justify-content: center; margin-top: 2rem; }
    @media (max-width: 900px) { .assemblers-grid { grid-template-columns: repeat(2,1fr); } .filters-bar { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) { .assemblers-grid { grid-template-columns: 1fr; } .filters-bar { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="../index.html" class="sidebar-logo">Assemble<span>AtEase</span></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <ul class="sidebar-nav">
        <li><a href="index.html"><span class="nav-icon">&#8962;</span> Dashboard</a></li>
        <li><a href="post-job.html"><span class="nav-icon">&#43;</span> Post a Job</a></li>
        <li><a href="my-jobs.html"><span class="nav-icon">&#128203;</span> My Jobs</a></li>
        <li><a href="browse-assemblers.html" class="active"><span class="nav-icon">&#128101;</span> Browse Assemblers</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile.html"><span class="nav-icon">&#9881;</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">&#8594;</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main">
    <div class="page-header">
      <div>
        <h1>Browse Assemblers</h1>
        <p>Find vetted professionals by skill, location, and rating.</p>
      </div>
      <a href="post-job.html" class="btn btn-primary">+ Post a job</a>
    </div>

    <div class="filters-bar">
      <div class="form-group" style="margin:0">
        <label for="search-filter">Search</label>
        <input type="text" id="search-filter" class="form-control" placeholder="Name or keyword..." />
      </div>
      <div class="form-group" style="margin:0">
        <label for="city-filter">City</label>
        <input type="text" id="city-filter" class="form-control" placeholder="e.g. Austin" />
      </div>
      <div class="form-group" style="margin:0">
        <label for="rate-filter">Max hourly rate ($)</label>
        <input type="number" id="rate-filter" class="form-control" placeholder="e.g. 75" min="0" />
      </div>
      <button class="btn btn-outline btn-sm" id="reset-btn" style="align-self:flex-end">Reset</button>
    </div>

    <div id="results-meta" class="results-meta"></div>
    <div id="assemblers-grid" class="assemblers-grid">
      <div style="grid-column:1/-1">
        <div class="skeleton-card"><div class="skeleton" style="height:180px"></div></div>
      </div>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <button class="btn btn-ghost btn-sm" id="prev-btn">&#8592; Previous</button>
      <span style="font-size:0.82rem;color:var(--muted)" id="page-info"></span>
      <button class="btn btn-ghost btn-sm" id="next-btn">Next &#8594;</button>
    </div>
  </main>
</div>

<script>
  let allAssemblers = [];
  let filtered = [];
  let currentPage = 0;
  const PER_PAGE = 12;

  function getInitials(name) {
    return (name || '?').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  // Show first name only
  function getFirstName(fullName) {
    return (fullName || 'Assembler').split(' ')[0];
  }

  function applyFilters() {
    const search  = document.getElementById('search-filter').value.toLowerCase().trim();
    const city    = document.getElementById('city-filter').value.toLowerCase().trim();
    const maxRate = parseFloat(document.getElementById('rate-filter').value) || null;

    filtered = allAssemblers.filter(a => {
      if (search && !a.full_name?.toLowerCase().includes(search) && !a.bio?.toLowerCase().includes(search)) return false;
      if (city && !a.city?.toLowerCase().includes(city)) return false;
      if (maxRate && a.hourly_rate > maxRate) return false;
      return true;
    });
    currentPage = 0;
    renderPage();
  }

  function renderPage() {
    const start = currentPage * PER_PAGE;
    const paged = filtered.slice(start, start + PER_PAGE);
    const total = filtered.length;
    const pages = Math.ceil(total / PER_PAGE);

    document.getElementById('results-meta').textContent =
      total > 0 ? `${total} assembler${total !== 1 ? 's' : ''} found` : '';

    const grid = document.getElementById('assemblers-grid');

    if (!paged.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>No assemblers found matching your search.</p><a href="post-job.html" class="btn btn-primary btn-sm">Post a job instead</a></div>`;
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    grid.innerHTML = paged.map(a => {
      const firstName = getFirstName(a.full_name);
      const initials  = getInitials(a.full_name);
      const skills    = Array.isArray(a.skills) ? a.skills
        : (typeof a.skills === 'string' && a.skills ? a.skills.split(',').map(s => s.trim()) : []);

      return `
        <a class="assembler-card" href="assembler-detail.html?id=${a.id}">
          <div class="assembler-avatar">
            ${a.profile_photo
              ? `<img src="${a.profile_photo}" alt="${firstName}" />`
              : initials}
          </div>
          <div class="assembler-name">${firstName}</div>
          <div class="assembler-rating">
            <span>&#9733; ${a.rating ? Number(a.rating).toFixed(1) : 'New'}</span>
            &nbsp;&middot;&nbsp; ${a.completed_jobs || 0} jobs
          </div>
          <div class="assembler-tags">
            ${a.city ? `<span class="assembler-tag">&#128205; ${a.city}</span>` : ''}
            ${a.hourly_rate ? `<span class="assembler-tag" style="background:var(--teal-light);color:var(--teal-dark);border-color:rgba(29,158,117,0.2)">$${a.hourly_rate}/hr</span>` : ''}
          </div>
          ${skills.length ? `<div class="assembler-tags">${skills.slice(0,3).map(s=>`<span class="assembler-tag">${s}</span>`).join('')}${skills.length>3?`<span class="assembler-tag">+${skills.length-3}</span>`:''}</div>` : ''}
          <div class="assembler-bio">${APP.truncate(a.bio||'Professional assembler ready to help.',80)}</div>
          <div class="btn btn-outline btn-sm" style="width:100%">View profile</div>
        </a>`;
    }).join('');

    const pag = document.getElementById('pagination');
    if (pages > 1) {
      pag.style.display = 'flex';
      document.getElementById('page-info').textContent = `Page ${currentPage+1} of ${pages}`;
      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = currentPage >= pages - 1;
    } else {
      pag.style.display = 'none';
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const auth = await APP.requireAuth(['customer']);
    if (!auth) return;

    document.getElementById('sidebar-logout')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '../index.html';
    });

    ['search-filter','city-filter','rate-filter'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', applyFilters);
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      document.getElementById('search-filter').value = '';
      document.getElementById('city-filter').value = '';
      document.getElementById('rate-filter').value = '';
      applyFilters();
    });

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentPage > 0) { currentPage--; renderPage(); window.scrollTo({top:0,behavior:'smooth'}); }
    });
    document.getElementById('next-btn').addEventListener('click', () => {
      currentPage++; renderPage(); window.scrollTo({top:0,behavior:'smooth'});
    });

    try {
      const { data, error } = await API.getAssemblers({ limit: 200 });
      if (error) throw error;
      // Filter out assemblers with no profile photo — optional, remove if you want all shown
      allAssemblers = (data || []).filter(a => a.full_name); // at minimum must have a name
      filtered = allAssemblers;
      renderPage();
    } catch (err) {
      document.getElementById('assemblers-grid').innerHTML =
        `<div class="error-state" style="grid-column:1/-1"><span>&#9888;</span>Could not load assemblers. Please refresh.</div>`;
    }
  });
</script>
</body>
</html>
