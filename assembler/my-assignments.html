<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Assignments — AssembleAtEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../assets/js/app.js" defer></script>
  <style>
    .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    body.theme-pro .filter-tab {
      padding: 0.4rem 1rem; border-radius: 999px;
      font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--pro-border-md);
      background: var(--pro-surface); color: var(--pro-soft);
      cursor: pointer; transition: all 0.15s;
    }
    body.theme-pro .filter-tab:hover { border-color: var(--pro-teal); color: var(--pro-teal); }
    body.theme-pro .filter-tab.active { background: rgba(0,151,167,0.08); color: var(--pro-teal); border-color: rgba(0,151,167,0.2); }

    body.theme-pro .asgn-card {
      background: var(--pro-surface); border: 1px solid var(--pro-border);
      border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem;
      transition: border-color 0.15s;
    }
    body.theme-pro .asgn-card:hover { border-color: var(--pro-border-md); }
    body.theme-pro .asgn-card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 0.5rem;
    }
    body.theme-pro .asgn-card h3 { font-size: 1rem; font-weight: 500; color: var(--pro-text); margin: 0; }
    body.theme-pro .asgn-card-meta { font-size: 0.82rem; color: var(--pro-muted); margin-top: 0.3rem; }
    body.theme-pro .asgn-card-footer {
      display: flex; align-items: center; gap: 1rem;
      font-size: 0.78rem; color: var(--pro-muted); flex-wrap: wrap;
      margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--pro-border);
    }
    body.theme-pro .asgn-status { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  </style>
</head>
<body class="theme-pro">
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="../" class="sidebar-logo">Assemble<span>AtEase</span></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Workspace</div>
      <ul class="sidebar-nav">
        <li><a href="."><span class="nav-icon">&#9889;</span> Dashboard</a></li>
        <li><a href="browse-jobs"><span class="nav-icon">&#128269;</span> Browse Jobs</a></li>
        <li><a href="my-bids"><span class="nav-icon">&#128172;</span> My Bids</a></li>
        <li><a href="my-jobs"><span class="nav-icon">&#128295;</span> My Jobs</a></li>
        <li><a href="my-assignments" class="active"><span class="nav-icon">&#128197;</span> My Assignments</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <ul class="sidebar-nav">
        <li><a href="profile"><span class="nav-icon">&#128100;</span> My Profile</a></li>
        <li><a href="#" id="sidebar-logout"><span class="nav-icon">&#128682;</span> Log out</a></li>
      </ul>
    </div>
  </aside>

  <main class="dashboard-main" style="padding:2rem">
    <div class="page-header" style="margin-bottom:1.5rem">
      <div>
        <h1 style="font-size:1.5rem;font-weight:600;margin:0 0 0.25rem">My Assignments</h1>
        <p style="font-size:0.875rem;color:var(--pro-muted);margin:0">Direct bookings assigned to you by the owner.</p>
      </div>
    </div>

    <div id="page-alert" class="alert hidden"></div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="confirmed">Active</button>
      <button class="filter-tab" data-filter="completed">Completed</button>
    </div>

    <div id="assignments-list">
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
      <div class="skeleton-card"><div class="skeleton" style="height:80px"></div></div>
    </div>
  </main>
</div>

<script>
  let allAssignments = [];
  let currentFilter = 'all';

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function formatDate(str) {
    if (!str) return '—';
    const d = new Date(str);
    if (isNaN(d)) return str;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function timeAgo(str) {
    if (!str) return '';
    const diff = Date.now() - new Date(str).getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return 'Yesterday';
    return days + 'd ago';
  }

  function renderAssignments(list) {
    const el = document.getElementById('assignments-list');
    if (!list || !list.length) {
      el.innerHTML = '<div class="pro-empty"><p>No assignments found for this filter.</p></div>';
      return;
    }
    el.innerHTML = list.map(function(b) {
      const customerFirst = (b.customer_name || 'Customer').split(' ')[0];
      const isCompleted = b.status === 'completed';
      const isActive = b.status === 'confirmed';
      const badgeClass = isCompleted ? 'badge-complete' : (b.assembler_accepted_at ? 'badge-accepted' : 'badge-pending');
      const badgeText = isCompleted ? 'Completed' : (b.assembler_accepted_at ? 'Accepted' : 'Pending Your Response');

      return '<div class="asgn-card">' +
        '<div class="asgn-card-top">' +
          '<div>' +
            '<h3>' + esc(b.service || 'Service') + '</h3>' +
            '<div class="asgn-card-meta">' +
              esc(customerFirst) +
              (b.date ? ' &bull; ' + esc(b.date) : '') +
              (b.time ? ' at ' + esc(b.time) : '') +
            '</div>' +
          '</div>' +
          '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
        '</div>' +
        '<div class="asgn-card-footer">' +
          '<span>Ref: <code>' + esc(b.ref) + '</code></span>' +
          (b.address ? '<span>' + esc(b.address) + '</span>' : '') +
          (isCompleted && b.completed_at ? '<span>Done ' + timeAgo(b.completed_at) + '</span>' : '') +
          (!isCompleted && b.assigned_at ? '<span>Assigned ' + timeAgo(b.assigned_at) + '</span>' : '') +
        '</div>' +
      '</div>';
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', async function() {
    const auth = await APP.requireVerifiedAssembler();
    if (!auth) return;
    const session = auth.session;

    document.getElementById('sidebar-logout').addEventListener('click', async function(e) {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '../';
    });

    document.getElementById('filter-tabs').addEventListener('click', function(e) {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      const filtered = currentFilter === 'all'
        ? allAssignments
        : allAssignments.filter(b => b.status === currentFilter);
      renderAssignments(filtered);
    });

    try {
      const resp = await fetch('/api/booking/my-assignments', {
        headers: { 'Authorization': 'Bearer ' + session.access_token },
      });
      if (!resp.ok) throw new Error('Failed to load assignments');
      const data = await resp.json();
      allAssignments = data.bookings || [];
      renderAssignments(allAssignments);
    } catch (err) {
      document.getElementById('assignments-list').innerHTML =
        '<div class="pro-error">&#9888; Could not load assignments. Please refresh.</div>';
    }
  });
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/245917212.js"></script>
</body>
</html>
