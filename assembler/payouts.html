  <style>
    :root{--pro-bg:#f8fafc;--pro-surface:#ffffff;--pro-elevated:#f1f5f9;--pro-border:#e2e8f0;--pro-border-md:#cbd5e1;--pro-text:#0d1117;--pro-muted:#64748b;--pro-soft:#374151;--pro-teal:#00BFFF;--pro-teal-dim:rgba(0,191,255,0.08);--teal:#00BFFF}
    .logout-link{font-size:0.72rem;color:var(--e-muted);text-decoration:none;font-weight:500;white-space:nowrap;padding:0.4rem 0}
    .logout-link:hover{color:var(--e-text)}
    /* Earnings-specific styles */
    .earn-tx-list { display: flex; flex-direction: column; gap: 0; }
    .earn-tx-row {
      display: flex; align-items: center; gap: 0.875rem;
      padding: 0.875rem 0; border-bottom: 1px solid var(--pro-border);
    }
    .earn-tx-row:last-child { border-bottom: none; }
    .earn-tx-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .earn-tx-icon.paid   { background: rgba(5,150,105,0.1);  color: #059669; }
    .earn-tx-icon.pending{ background: rgba(245,158,11,0.1); color: #d97706; }
    .earn-tx-info  { flex: 1; min-width: 0; }
    .earn-tx-name  { font-size: 0.88rem; font-weight: 600; color: var(--pro-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .earn-tx-date  { font-size: 0.72rem; color: var(--pro-muted); margin-top: 2px; }
    .earn-tx-right { text-align: right; flex-shrink: 0; }
    .earn-tx-amount { font-size: 1rem; font-weight: 700; color: var(--pro-text); line-height: 1; }
    .earn-tx-amount.paid { color: #059669; }
    .earn-tx-status { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
    .earn-tx-status.paid    { color: #059669; }
    .earn-tx-status.pending { color: #d97706; }
    .earn-summary-box {
      background: var(--pro-elevated); border-radius: 12px;
      padding: 1rem 1.25rem; margin-top: 1rem;
    }
    .earn-summary-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.85rem; padding: 0.35rem 0; color: var(--pro-soft);
    }
    .earn-summary-row.total {
      border-top: 1px solid var(--pro-border-md); padding-top: 0.6rem;
      margin-top: 0.25rem; font-weight: 700; color: var(--pro-text);
    }
    .connect-card {
      margin-top: 1rem;
      background: #fff;
      border: 1px solid var(--pro-border);
      border-radius: 14px;
      padding: 0.95rem 1rem;
    }
    .connect-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .connect-title {
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--pro-muted);
      font-weight: 700;
      margin-bottom: 0.2rem;
    }
    .connect-state {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--pro-text);
    }
    .connect-note {
      margin-top: 0.6rem;
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--pro-soft);
    }
    .connect-pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .connect-pill.enabled { background: #ecfdf3; color: #166534; border-color: #bbf7d0; }
    .connect-pill.pending { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .connect-pill.restricted { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
    .connect-pill.action_required { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .connect-btn {
      margin-top: 0.7rem;
      background: var(--pro-teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.52rem 0.82rem;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .payout-guide {
      margin-top: 1rem;
      background: #fff;
      border: 1px solid var(--pro-border);
      border-radius: 14px;
      padding: 1rem;
    }
    .payout-guide-title {
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--pro-muted);
      font-weight: 700;
      margin-bottom: 0.55rem;
    }
    .payout-guide-body {
      display: grid;
      gap: 0.75rem;
    }
    .payout-guide-row {
      padding: 0.75rem 0;
      border-top: 1px solid var(--pro-border);
    }
    .payout-guide-row:first-child {
      border-top: none;
      padding-top: 0;
    }
    .payout-guide-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--pro-text);
      margin-bottom: 0.2rem;
    }
    .payout-guide-copy {
      font-size: 0.76rem;
      line-height: 1.55;
      color: var(--pro-soft);
    }
    .payout-guide-list {
      margin-top: 0.4rem;
      padding-left: 1rem;
      color: var(--pro-soft);
      font-size: 0.76rem;
      line-height: 1.55;
    }
  </style>
</head>

<script>
  var allCompleted = [];

  function fmt(cents) {
    if (!cents && cents !== 0) return '—';
    return '$' + (cents / 100).toFixed(2);
  }
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function filterByPeriod(list, period) {
    if (period === 'all') return list;
    var now = new Date();
    if (period === 'week') {
      var cutoff = new Date(now - 7 * 86400000);
      return list.filter(function(b){ return b.completed_at && new Date(b.completed_at) >= cutoff; });
    }
    if (period === 'month') {
      var cutoff = new Date(now.getFullYear(), now.getMonth(), 1);
      return list.filter(function(b){ return b.completed_at && new Date(b.completed_at) >= cutoff; });
    }
    return list;
  }

  function renderEarnings(list) {
    var totalEarned  = list.reduce(function(s, b){ return s + (b.assembler_due || 0); }, 0);
    var totalFees    = list.reduce(function(s, b){ return s + (b.platform_fee || 0); }, 0);
    var totalPaid    = list.filter(function(b){ return b.payout_status === 'paid'; }).reduce(function(s,b){ return s + (b.assembler_due||0); }, 0);
    var totalPending = list.filter(function(b){ return b.payout_status !== 'paid'; }).reduce(function(s,b){ return s + (b.assembler_due||0); }, 0);

    document.getElementById('earn-total-val').textContent = fmt(totalEarned);
    document.getElementById('earn-split').innerHTML =
      '<div class="e-earn-split-item"><strong>' + list.length + '</strong><span>Jobs</span></div>' +
      '<div class="e-earn-split-item"><strong>' + fmt(totalPaid) + '</strong><span>Paid Out</span></div>' +
      '<div class="e-earn-split-item"><strong>' + fmt(totalPending) + '</strong><span>Pending</span></div>';

    var el = document.getElementById('payouts-list');
    if (!list.length) {
      el.innerHTML = '<div class="e-empty"><div class="e-empty-title">No earnings in this period</div><div class="e-empty-desc">Complete a job to see your earnings here.</div></div>';
      return;
    }

    var checkIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
    var clockIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

    var rows = list.slice().reverse().map(function(b) {
      var isPaid = b.payout_status === 'paid';
      var isZero = !b.assembler_due;
      var dateLabel = (isPaid && b.paid_out_at)
        ? ('Paid ' + fmtDate(b.paid_out_at))
        : ('Completed ' + fmtDate(b.completed_at) + ' · Awaiting payout');
      return '<div class="earn-tx-row">' +
        '<div class="earn-tx-icon ' + (isPaid ? 'paid' : 'pending') + '">' + (isPaid ? checkIcon : clockIcon) + '</div>' +
        '<div class="earn-tx-info">' +
          '<div class="earn-tx-name">' + esc(b.service || 'Service') + '</div>' +
          '<div class="earn-tx-date">' + dateLabel + '</div>' +
          ((isZero && !isPaid) ? '<div style="font-size:0.68rem;color:#d97706;margin-top:2px;line-height:1.4">Amount pending confirmation — our team will update this shortly.</div>' : '') +
        '</div>' +
        '<div class="earn-tx-right">' +
          '<div class="earn-tx-amount ' + (isPaid ? 'paid' : '') + '">' + fmt(b.assembler_due) + '</div>' +
          '<div class="earn-tx-status ' + (isPaid ? 'paid' : 'pending') + '">' + (isPaid ? 'Paid' : 'Awaiting Payout') + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    var memberNote = '';

    el.innerHTML = '<div style="background:#fff;border:1px solid var(--pro-border);border-radius:14px;padding:0 1rem"><div class="earn-tx-list">' + rows + '</div></div>' + memberNote;
  }

  function renderPayoutGuide(list, connectData) {
    var guide = document.getElementById('payout-guide-body');
    if (!guide) return;

    var connectOn    = !!(connectData && connectData.enabled !== false && connectData.connect);
    var connectReady = connectOn && connectData.connect.code === 'enabled';

    var latestPaid = list.filter(function(b) { return b.payout_status === 'paid' && b.paid_out_at; })
      .sort(function(a, b) { return new Date(b.paid_out_at) - new Date(a.paid_out_at); })[0] || null;
    var pendingCount = list.filter(function(b) { return b.payout_status !== 'paid'; }).length;

    // Accurate to how the platform actually pays: a 48h hold after completion, then
    // an automatic Stripe transfer to the Pro's bank once their payout setup is done.
    var howCopy = connectOn
      ? (connectReady
          ? 'When you mark a job complete, your earnings are held for 48 hours, then sent automatically to your bank through Stripe. No action needed on your end.'
          : 'When you mark a job complete, your earnings are held for 48 hours, then sent to your bank through Stripe. Finish your payout setup above so transfers can go through.')
      : 'When you mark a job complete, the AssembleAtEase team reviews and releases your payout. Nothing to do here.';

    var rows = ''
      + '<div class="payout-guide-row">'
        + '<div class="payout-guide-label">How payouts work</div>'
        + '<div class="payout-guide-copy">' + howCopy + '</div>'
      + '</div>'
      + '<div class="payout-guide-row">'
        + '<div class="payout-guide-label">Pending</div>'
        + '<div class="payout-guide-copy">' + (pendingCount
            ? pendingCount + ' job' + (pendingCount === 1 ? '' : 's') + ' awaiting payout.'
            : 'You’re all caught up — no payouts pending.') + '</div>'
      + '</div>';

    if (latestPaid) {
      rows += '<div class="payout-guide-row">'
        + '<div class="payout-guide-label">Last payout</div>'
        + '<div class="payout-guide-copy">' + fmt(latestPaid.assembler_due) + ' on ' + fmtDate(latestPaid.paid_out_at) + '.</div>'
      + '</div>';
    }

    guide.innerHTML = rows;
  }

  function renderConnectStatus(data) {
    var card = document.getElementById('connect-card');
    var state = document.getElementById('connect-state');
    var note = document.getElementById('connect-note');
    var pill = document.getElementById('connect-pill');
    var btn = document.getElementById('connect-action');
    card.style.display = '';

    if (!data || data.enabled === false || !data.connect) {
      state.textContent = 'Manual payouts';
      note.textContent = 'Payouts are recorded by the AssembleAtEase team after completed jobs. No Stripe setup is required here.';
      pill.textContent = 'Managed by team';
      pill.className = 'connect-pill restricted';
      btn.style.display = 'none';
      return;
    }

    var code = data.connect.code || 'pending';
    var label = data.connect.label || 'Pending';
    state.textContent = label;
    note.textContent = data.connect.message || '';
    pill.textContent = label;
    pill.className = 'connect-pill ' + code;

    if (code === 'enabled') {
      btn.style.display = '';
      btn.dataset.mode = 'portal';
      btn.textContent = 'Update payout details';
      return;
    }

    btn.style.display = '';
    btn.dataset.mode = 'onboarding';
    btn.textContent = code === 'action_required' ? 'Fix in Stripe' : 'Complete Setup';
  }

  async function openConnectPortal(token) {
    var btn = document.getElementById('connect-action');
    if (!btn) return;
    btn.disabled = true;
    var prev = btn.textContent;
    btn.textContent = 'Opening…';
    try {
      var r = await fetch('/api/assembler/connect-login', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({})
      });
      var d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Unable to open Stripe dashboard');
      if (d.url) window.location.href = d.url;
    } catch (err) {
      alert(err.message || 'Unable to open payout settings right now. Please try again.');
      btn.disabled = false;
      btn.textContent = prev;
    }
  }

  async function openConnectOnboarding(token) {
    var btn = document.getElementById('connect-action');
    if (!btn) return;
    btn.disabled = true;
    var prev = btn.textContent;
    btn.textContent = 'Opening…';
    try {
      var r = await fetch('/api/assembler/connect-link', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({})
      });
      var d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Unable to open Stripe onboarding');
      if (d.onboardingUrl) window.location.href = d.onboardingUrl;
    } catch (err) {
      alert(err.message || 'Unable to open onboarding right now. Please try again.');
      btn.disabled = false;
      btn.textContent = prev;
    }
  }

  document.addEventListener('DOMContentLoaded', async function() {
    const auth = await APP.requireAuth(["assembler"]);
    if (!auth) return;
    document.body.style.visibility = 'visible';
    const session = auth.session;

    // getToken with expiry check — refreshes automatically if JWT is stale
    async function getToken() {
      try {
        const { data: { session: s } } = await supabaseClient.auth.getSession();
        if (s.access_token) {
          const now = Math.floor(Date.now() / 1000);
          if (!s.expires_at || s.expires_at > now + 60) return s.access_token;
        }
        const { data: refreshed } = await supabaseClient.auth.refreshSession();
        if (refreshed.session.access_token) return refreshed.session.access_token;
      } catch {}
      return session.access_token;
    }

    var offlineBanner = document.getElementById('e-offline');
    window.addEventListener('offline', function() { if (offlineBanner) offlineBanner.classList.add('show'); });
    window.addEventListener('online',  function() { if (offlineBanner) offlineBanner.classList.remove('show'); });

    // Notification bell
    var _notifPanel = document.getElementById('notif-panel');
    var _notifBackdrop = document.getElementById('notif-backdrop');
    function showNotif(){_notifPanel.style.display='block';if(_notifBackdrop)_notifBackdrop.style.display='block';}
    function hideNotif(){_notifPanel.style.display='none';if(_notifBackdrop)_notifBackdrop.style.display='none';}
    document.getElementById('eh-bell-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      _notifPanel.style.display === 'none' ? showNotif() : hideNotif();
    });
    document.addEventListener('click', function() { if (_notifPanel && _notifPanel.style.display !== 'none') hideNotif(); });

    document.getElementById('sidebar-logout').addEventListener('click', async function(e) {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = '/auth/login.html';
    });

    // Period tab switching
    document.getElementById('period-tabs').addEventListener('click', function(e) {
      var tab = e.target.closest('.e-period-tab');
      if (!tab) return;
      document.querySelectorAll('.e-period-tab').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      renderEarnings(filterByPeriod(allCompleted, tab.dataset.period));
    });

    try {
      let token = await getToken();
      if (!token) { window.location.href = '/auth/login.html'; return; }
      var connectData = null;

      var connectResp = await fetch('/api/assembler/connect-status', {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      if (connectResp.ok) {
        connectData = await connectResp.json();
        renderConnectStatus(connectData);
      }
      var connectBtn = document.getElementById('connect-action');
      if (connectBtn) {
        connectBtn.addEventListener('click', function() {
          var mode = connectBtn.dataset.mode || 'onboarding';
          if (mode === 'portal') {
            openConnectPortal(token);
            return;
          }
          openConnectOnboarding(token);
        });
      }

      let resp = await fetch('/api/booking/my-assignments', {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      // On 401: force-refresh once and retry before redirecting
      if (resp.status === 401) {
        try {
          const { data: rd } = await supabaseClient.auth.refreshSession();
          if (rd.session.access_token) {
            token = rd.session.access_token;
            resp = await fetch('/api/booking/my-assignments', { headers: { 'Authorization': 'Bearer ' + token } });
          }
        } catch {}
        if (resp.status === 401) { window.location.href = '/auth/login.html'; return; }
      }
      if (!resp.ok) throw new Error('Failed to load');
      const data = await resp.json();
      allCompleted = (data.bookings || []).filter(function(b){ return b.status === 'completed'; });
      renderEarnings(allCompleted);
      renderPayoutGuide(allCompleted, connectData);
    } catch (err) {
      document.getElementById('payouts-list').innerHTML =
        '<div class="e-alert error show">Could not load earnings history. Please refresh.</div>';
    }
  });
</script>
